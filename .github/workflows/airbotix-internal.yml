# CI for Airbotix / DeepRouter internal packages.
# Runs only on changes to our additions (model/user.go, internal/**) to avoid
# stepping on upstream NewAPI's own CI matrix.
name: airbotix-internal

on:
  push:
    branches: [main]
    paths:
      - 'model/user.go'
      - 'internal/**'
      - 'middleware/policy.go'
      - 'relay/airbotix_policy.go'
      - 'relay/airbotix_policy_test.go'
      - 'service/airbotix_billing.go'
      - 'constant/context_key.go'
      - 'controller/**'
      - 'router/**'
      - 'dto/**'
      - 'common/**'
      - '.github/workflows/airbotix-internal.yml'
  pull_request:
    paths:
      - 'model/user.go'
      - 'internal/**'
      - 'middleware/policy.go'
      - 'relay/airbotix_policy.go'
      - 'relay/airbotix_policy_test.go'
      - 'service/airbotix_billing.go'
      - 'constant/context_key.go'
      - 'controller/**'
      - 'router/**'
      - 'dto/**'
      - 'common/**'
      - '.github/workflows/airbotix-internal.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Resolve module deps
        run: go mod download

      - name: Vet Airbotix-owned packages
        # Limited to packages with our additions. Vetting the wider relay tree
        # pulls in upstream relay/channel/* dependencies that have pre-existing
        # "unreachable code" diagnostics — we let build/test gate those.
        run: go vet ./internal/... ./middleware/...

      - name: Build full tree we wire into
        # NOTE: controller/ and router/ are included so a Go compile error
        # like PR #8's `cleanUser.Setting = &settingStr` (string vs *string
        # mismatch) gets caught here. The full-tree docker build only
        # runs on push to alpha/nightly branches, so without these two
        # paths a broken main can sit broken for days.
        run: |
          go build ./internal/...
          go build ./model/... ./constant/... ./middleware/... ./service/... ./relay/...
          go build ./controller/... ./router/... ./dto/... ./common/...

      - name: Run unit tests
        run: |
          go test ./internal/... -count=1 -race -timeout 60s
          go test ./model/ -run 'TestUser_Airbotix' -count=1 -timeout 60s
          go test ./relay/ -run 'TestApplyAirbotixPolicy' -count=1 -race -timeout 60s
          # Smart-router integration: catalog endpoint pricing math, kids
          # pre-filter, brand map, input validation, cross-model fallback,
          # internal-token auth, ResolveAutoModel hot path.
          go test ./controller/ -run 'TestModelRatio|TestGetModelRatio|TestKidsMode|TestGetRouterCatalog|TestChannelTypeToBrand|TryCrossModelFallback|IsChannelExhaustion' -count=1 -race -timeout 60s
          go test ./middleware/ -run 'TestInternalToken|TestResolveAutoModel' -count=1 -race -timeout 60s
