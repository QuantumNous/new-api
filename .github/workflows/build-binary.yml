name: Build Binary

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: go build -ldflags="-s -w" -o new-api-linux-amd64 .

      - uses: actions/upload-artifact@v4
        with:
          name: new-api-linux-amd64
          path: new-api-linux-amd64
