name: Deploy new-api

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: new-api-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/${REPO}"
          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "latest=${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "sha=${IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.latest }}
            ${{ steps.image.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_REF: ${{ steps.image.outputs.sha }}
          DEPLOY_DIR: ${{ secrets.NEW_API_DEPLOY_DIR || '/home/elissias/docker-compose/new-api' }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT || '22' }}
          username: ${{ secrets.SSH_USER || 'elissias' }}
          key: ${{ secrets.SSH_KEY }}
          envs: IMAGE_REF,DEPLOY_DIR,GHCR_USER,GHCR_TOKEN
          script: |
            set -eu
            cd "$DEPLOY_DIR"
            test -f docker-compose.yml
            test -f .env
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            fi
            printf '%s\n' 'services:' '  new-api:' "    image: ${IMAGE_REF}" > docker-compose.prod.yml
            docker compose -f docker-compose.yml -f docker-compose.prod.yml config >/dev/null
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull new-api
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:3000/api/status >/dev/null; then
                exit 0
              fi
              sleep 2
            done
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=120 new-api
            exit 1
