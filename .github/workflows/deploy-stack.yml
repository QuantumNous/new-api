name: Deploy Stack

# Reusable workflow: SSH into the target server, pull the image from
# the private registry, update the docker compose stack, and bring it up.
#
# Both the automated release pipeline and the manual rollback entry
# point (deploy.yml) call this via `uses:` + `with: image_tag`.
#
# Required GitHub Secrets (set in repo Settings -> Secrets):
#   DEPLOY_HOST        — SSH hostname or IP (e.g. 1.2.3.4)
#   DEPLOY_USER        — SSH username (e.g. root)
#   DEPLOY_SSH_KEY     — SSH private key (PEM format, the whole file content)
#   DEPLOY_PATH        — Remote path where docker-compose.yml lives (e.g. /opt/new-api)
#   REGISTRY_USERNAME  — Private registry username (optional if registry is open)
#   REGISTRY_PASSWORD  — Private registry password (optional if registry is open)
#
# Required GitHub Variables (set in repo Settings -> Variables):
#   IMAGE_REGISTRY     — Private registry address (e.g. registry.example.com/myorg)
#
# Optional GitHub Variables:
#   DEPLOY_PORT        — SSH port (default: 22)

on:
  workflow_call:
    inputs:
      image_tag:
        description: '要部署的镜像 tag (例: v2026.06.30-1)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ vars.DEPLOY_PORT || '22' }}
          envs: IMAGE_TAG,IMAGE_REGISTRY,REGISTRY_USERNAME,REGISTRY_PASSWORD,DEPLOY_PATH
          script: |
            set -euo pipefail

            # Login to private registry on the remote server
            if [ -n "$REGISTRY_USERNAME" ]; then
              registry_host="$(echo "${IMAGE_REGISTRY}" | cut -d/ -f1)"
              echo "${REGISTRY_PASSWORD}" | docker login "$registry_host" \
                --username "$REGISTRY_USERNAME" --password-stdin
            fi

            # Pull the new image
            docker pull "${IMAGE_REGISTRY}/new-api:${IMAGE_TAG}"

            # Update the image reference in docker-compose.yml
            cd "${DEPLOY_PATH}"
            sed -i "s|image:.*new-api.*|image: ${IMAGE_REGISTRY}/new-api:${IMAGE_TAG}|" docker-compose.yml

            # Restart the stack
            docker compose up -d --remove-orphans
            docker compose ps

            # Prune dangling images to reclaim space
            docker image prune -f

            # Logout (never leave credentials cached)
            if [ -n "$REGISTRY_USERNAME" ]; then
              registry_host="$(echo "${IMAGE_REGISTRY}" | cut -d/ -f1)"
              docker logout "$registry_host" || true
            fi
