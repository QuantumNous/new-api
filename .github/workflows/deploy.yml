name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Job 1: 构建 + 打包 Docker 镜像 → 推送到阿里云 ACR
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: registry.cn-hangzhou.aliyuncs.com/dfd_public/new-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: 服务端自动部署镜像
  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Login to Alibaba Cloud Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Pull latest image
        run: docker pull registry.cn-hangzhou.aliyuncs.com/dfd_public/new-api:latest

      - name: Deploy with docker compose
        run: |
          echo "[$(date)] Starting deployment..."
          cd /opt/new-api
          echo "[$(date)] Pulling latest image..."
          docker compose pull
          echo "[$(date)] Stopping old containers..."
          docker compose down
          echo "[$(date)] Starting new containers..."
          docker compose up -d
          echo "[$(date)] Cleaning up..."
          docker system prune -f
          echo "[$(date)] Deploy completed!"
          docker compose ps
