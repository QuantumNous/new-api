name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync code to /opt/new-api
        run: |
          echo "[$(date)] Syncing latest code to /opt/new-api..."
          # 使用 rsync 同步代码，排除数据目录和日志
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='data' \
            --exclude='logs' \
            --exclude='.custom-backup' \
            --exclude='*.tar.gz' \
            "${GITHUB_WORKSPACE}/" /opt/new-api/
          echo "[$(date)] Code sync completed!"

      - name: Build Docker image
        run: |
          echo "[$(date)] Building Docker image..."
          cd /opt/new-api
          docker build -t new-api:latest .
          echo "[$(date)] Build completed!"

      - name: Deploy to server
        run: |
          echo "[$(date)] Stopping old containers..."
          cd /opt/new-api
          docker compose down
          echo "[$(date)] Starting new containers..."
          docker compose up -d
          echo "[$(date)] Cleaning up..."
          docker system prune -f
          echo "[$(date)] Deploy completed!"
          docker compose ps