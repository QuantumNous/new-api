name: Build and Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t new-api:latest .

      - name: Save Docker image
        run: |
          docker save new-api:latest | gzip > new-api.tar.gz
          ls -lh new-api.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-image
          path: new-api.tar.gz
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: new-api-image

      - name: Copy image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "new-api.tar.gz"
          target: "/opt/new-api/"
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /opt/new-api
            echo "[$(date)] Loading new image..."
            docker load < new-api.tar.gz
            echo "[$(date)] Stopping old containers..."
            docker compose down
            echo "[$(date)] Starting new containers..."
            docker compose up -d
            echo "[$(date)] Cleaning up..."
            rm -f new-api.tar.gz
            docker system prune -f
            echo "[$(date)] Deploy completed!"
            docker compose ps