name: Publish Docker image (Multi-arch)

on:
  push:
    branches:
      - main
    tags:
      - '*'
      - '!nightly*'
      - '!*-alpha*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (e.g., main or v0.10.8)'
        required: false
        default: 'main'
        type: string

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    outputs:
      image_version: ${{ steps.version.outputs.image_version }}

    permissions:
      packages: write
      contents: read
      id-token: write

    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && 0 || 1 }}
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Resolve image version & write VERSION
        id: version
        run: |
          if [ -n "${{ github.event.inputs.ref }}" ]; then
            REF_NAME="${{ github.event.inputs.ref }}"
            if git rev-parse "refs/tags/$REF_NAME" >/dev/null 2>&1; then
              IMAGE_VERSION="$REF_NAME"
              VERSION_KIND="tag"
            else
              SHORT_SHA="$(git rev-parse --short HEAD)"
              SAFE_REF="${REF_NAME//\//-}"
              IMAGE_VERSION="${SAFE_REF}-${SHORT_SHA}"
              VERSION_KIND="ref"
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            IMAGE_VERSION="${GITHUB_REF#refs/tags/}"
            VERSION_KIND="tag"
          else
            SHORT_SHA="$(git rev-parse --short HEAD)"
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
            SAFE_BRANCH="${BRANCH_NAME//\//-}"
            IMAGE_VERSION="${SAFE_BRANCH}-${SHORT_SHA}"
            VERSION_KIND="branch"
          fi
          echo "IMAGE_VERSION=${IMAGE_VERSION}" >> $GITHUB_ENV
          echo "VERSION_KIND=${VERSION_KIND}" >> $GITHUB_ENV
          echo "image_version=${IMAGE_VERSION}" >> $GITHUB_OUTPUT
          echo "${IMAGE_VERSION}" > VERSION
          echo "Building image version: ${IMAGE_VERSION} (${VERSION_KIND}) for ${{ matrix.arch }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: calciumion/new-api

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            calciumion/new-api:${{ env.IMAGE_VERSION }}-${{ matrix.arch }}
            calciumion/new-api:latest-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        run: cosign sign --yes calciumion/new-api@${{ steps.build.outputs.digest }}

      - name: Image summary
        run: |
          echo "### Docker Image Digest (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "calciumion/new-api:${IMAGE_VERSION}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "calciumion/new-api:latest-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  create_manifests:
    name: Create multi-arch manifests
    needs: [build_single_arch]
    runs-on: ubuntu-latest

    steps:
      - name: Set image version
        run: echo "IMAGE_VERSION=${{ needs.build_single_arch.outputs.image_version }}" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push manifest (version)
        run: |
          docker buildx imagetools create \
            -t calciumion/new-api:${IMAGE_VERSION} \
            calciumion/new-api:${IMAGE_VERSION}-amd64 \
            calciumion/new-api:${IMAGE_VERSION}-arm64

      - name: Create & push manifest (latest)
        run: |
          docker buildx imagetools create \
            -t calciumion/new-api:latest \
            calciumion/new-api:latest-amd64 \
            calciumion/new-api:latest-arm64

      - name: Manifest summary
        run: |
          echo "### Multi-arch Manifest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect calciumion/new-api:${IMAGE_VERSION} >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect calciumion/new-api:latest >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
