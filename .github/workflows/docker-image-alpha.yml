name: Publish Docker image (alpha)

on:
  push:
    branches:
      - alpha
  workflow_dispatch:
    inputs:
      name:
        description: "reason"
        required: false

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }}) [native]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      contents: read
    steps:
      - name: Validate Docker Hub configuration
        run: |
          IMAGE_REPOSITORY="${{ vars.DOCKERHUB_REPOSITORY }}"
          if [ -z "$IMAGE_REPOSITORY" ]; then
            echo "::error title=Missing GitHub variable::Please configure repository variable DOCKERHUB_REPOSITORY."
            echo "::error title=Required secrets::Please configure repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "::error title=Missing GitHub secret::Please configure repository secret DOCKERHUB_USERNAME."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error title=Missing GitHub secret::Please configure repository secret DOCKERHUB_TOKEN."
            exit 1
          fi
          echo "IMAGE_REPOSITORY=$IMAGE_REPOSITORY" >> $GITHUB_ENV

      - name: Check out (shallow)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Determine alpha version
        id: version
        run: |
          VERSION="alpha-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "$VERSION" > VERSION
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version: $VERSION for ${{ matrix.arch }}"

      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_REPOSITORY }}
            ghcr.io/${{ env.GHCR_REPOSITORY }}

      - name: Build & push single-arch (to both registries)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:alpha-${{ matrix.arch }}
            ${{ env.IMAGE_REPOSITORY }}:${{ steps.version.outputs.value }}-${{ matrix.arch }}
            ghcr.io/${{ env.GHCR_REPOSITORY }}:alpha-${{ matrix.arch }}
            ghcr.io/${{ env.GHCR_REPOSITORY }}:${{ steps.version.outputs.value }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  create_manifests:
    name: Create multi-arch manifests (Docker Hub + GHCR)
    needs: [build_single_arch]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Validate Docker Hub configuration
        run: |
          IMAGE_REPOSITORY="${{ vars.DOCKERHUB_REPOSITORY }}"
          if [ -z "$IMAGE_REPOSITORY" ]; then
            echo "::error title=Missing GitHub variable::Please configure repository variable DOCKERHUB_REPOSITORY."
            echo "::error title=Required secrets::Please configure repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "::error title=Missing GitHub secret::Please configure repository secret DOCKERHUB_USERNAME."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error title=Missing GitHub secret::Please configure repository secret DOCKERHUB_TOKEN."
            exit 1
          fi
          echo "IMAGE_REPOSITORY=$IMAGE_REPOSITORY" >> $GITHUB_ENV

      - name: Check out (shallow)
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Determine alpha version
        id: version
        run: |
          VERSION="alpha-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push manifest (Docker Hub - alpha)
        run: |
          docker buildx imagetools create \
            -t ${IMAGE_REPOSITORY}:alpha \
            ${IMAGE_REPOSITORY}:alpha-amd64 \
            ${IMAGE_REPOSITORY}:alpha-arm64

      - name: Create & push manifest (Docker Hub - versioned alpha)
        run: |
          docker buildx imagetools create \
            -t ${IMAGE_REPOSITORY}:${VERSION} \
            ${IMAGE_REPOSITORY}:${VERSION}-amd64 \
            ${IMAGE_REPOSITORY}:${VERSION}-arm64

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (GHCR - alpha)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:alpha \
            ghcr.io/${GHCR_REPOSITORY}:alpha-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:alpha-arm64

      - name: Create & push manifest (GHCR - versioned alpha)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:${VERSION} \
            ghcr.io/${GHCR_REPOSITORY}:${VERSION}-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:${VERSION}-arm64
