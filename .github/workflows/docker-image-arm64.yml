name: Publish Docker image (Docker Hub, native amd64+arm64)

on:
  push:
    tags:
      - '*'
      - '!nightly*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to build (e.g., v0.10.8-alpha.3)'
        required: true
        type: string

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }}) [native]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    permissions:
      packages: write
      contents: read

    steps:
      - name: Validate Docker Hub configuration
        run: |
          IMAGE_REPOSITORY="${{ vars.DOCKERHUB_REPOSITORY }}"
          if [ -z "$IMAGE_REPOSITORY" ]; then
            echo "::error title=Missing GitHub variable::Please configure repository variable DOCKERHUB_REPOSITORY."
            echo "::error title=Required secrets::Please configure repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "::error title=Missing GitHub secret::Please configure repository secret DOCKERHUB_USERNAME."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error title=Missing GitHub secret::Please configure repository secret DOCKERHUB_TOKEN."
            exit 1
          fi
          echo "IMAGE_REPOSITORY=$IMAGE_REPOSITORY" >> $GITHUB_ENV

      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && 0 || 1 }}
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag & write VERSION
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            # Verify tag exists
            if ! git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
              echo "Error: Tag '$TAG' does not exist in the repository"
              exit 1
            fi
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "$TAG" > VERSION
          if [[ "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "PUBLISH_LATEST=true" >> $GITHUB_ENV
          else
            echo "PUBLISH_LATEST=false" >> $GITHUB_ENV
          fi
          echo "Building tag: $TAG for ${{ matrix.arch }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_REPOSITORY }}

      - name: Build & push version tag
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ env.TAG }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Build & push latest tag
        if: env.PUBLISH_LATEST == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:latest-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  create_manifests:
    name: Create multi-arch manifests (Docker Hub)
    needs: [build_single_arch]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Validate Docker Hub configuration
        run: |
          IMAGE_REPOSITORY="${{ vars.DOCKERHUB_REPOSITORY }}"
          if [ -z "$IMAGE_REPOSITORY" ]; then
            echo "::error title=Missing GitHub variable::Please configure repository variable DOCKERHUB_REPOSITORY."
            echo "::error title=Required secrets::Please configure repository secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "::error title=Missing GitHub secret::Please configure repository secret DOCKERHUB_USERNAME."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error title=Missing GitHub secret::Please configure repository secret DOCKERHUB_TOKEN."
            exit 1
          fi
          echo "IMAGE_REPOSITORY=$IMAGE_REPOSITORY" >> $GITHUB_ENV

      - name: Extract tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          fi
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [[ "$TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "PUBLISH_LATEST=true" >> $GITHUB_ENV
          else
            echo "PUBLISH_LATEST=false" >> $GITHUB_ENV
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push manifest (Docker Hub - version)
        run: |
          docker buildx imagetools create \
            -t ${IMAGE_REPOSITORY}:${TAG} \
            ${IMAGE_REPOSITORY}:${TAG}-amd64 \
            ${IMAGE_REPOSITORY}:${TAG}-arm64

      - name: Create & push manifest (Docker Hub - latest)
        if: env.PUBLISH_LATEST == 'true'
        run: |
          docker buildx imagetools create \
            -t ${IMAGE_REPOSITORY}:latest \
            ${IMAGE_REPOSITORY}:latest-amd64 \
            ${IMAGE_REPOSITORY}:latest-arm64
