name: Publish Docker image (dev)

# Builds the backend-only dev image (Dockerfile.dev) and pushes it to the
# current user's Docker Hub namespace. Triggered on push to the working
# branch or manually via workflow_dispatch.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME - your Docker Hub namespace (e.g. gentlelijie)
#   DOCKERHUB_TOKEN    - a Docker Hub access token with write permission

on:
  push:
    branches:
      - feat/image-aware-model-routing
    paths-ignore:
      - 'web/**'
      - '*.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      name:
        description: "reason"
        required: false

jobs:
  build_and_push:
    name: Build & push (multi-arch)
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Determine dev version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=dev" >> $GITHUB_OUTPUT
          echo "versioned=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Publishing dev image: dev, dev-${SHORT_SHA}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dev
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/new-api:${{ steps.version.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/new-api:${{ steps.version.outputs.versioned }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output digest
        run: |
          echo "### Dev Docker Image" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ secrets.DOCKERHUB_USERNAME }}/new-api:dev" >> $GITHUB_STEP_SUMMARY
          echo "${{ secrets.DOCKERHUB_USERNAME }}/new-api:${{ steps.version.outputs.versioned }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
