name: Publish Docker image (dev)

# Builds the backend-only dev image (Dockerfile.dev) and pushes it to the
# GitHub Container Registry (ghcr.io) under this repo's owner namespace.
# Authenticates with the built-in GITHUB_TOKEN, so no Docker Hub secrets
# are required.
#
# After the first publish, set the package to "public" at
#   https://github.com/users/<owner>/packages/container/new-api/settings
# so it can be pulled anonymously.

on:
  push:
    branches:
      - feat/image-aware-model-routing
    paths-ignore:
      - 'web/**'
      - '*.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      name:
        description: "reason"
        required: false

jobs:
  build_and_push:
    name: Build & push (multi-arch)
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve GHCR image name
        id: ghcr
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER_LC}/new-api" >> $GITHUB_OUTPUT

      - name: Determine dev version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "versioned=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Publishing dev image: dev, dev-${SHORT_SHA} -> ${{ steps.ghcr.outputs.image }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dev
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.ghcr.outputs.image }}:dev
            ${{ steps.ghcr.outputs.image }}:${{ steps.version.outputs.versioned }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output digest
        run: |
          echo "### Dev Docker Image" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.ghcr.outputs.image }}:dev" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.ghcr.outputs.image }}:${{ steps.version.outputs.versioned }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
