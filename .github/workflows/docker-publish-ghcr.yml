name: Publish Docker image to GHCR

on:
  push:
    branches:
      - dev
      - package                # 增加 package 分支
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (default depends on branch)"
        required: false
        default: ""             # 空表示由分支决定

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image name
        run: echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Set tag
        id: vars
        run: |
          # 如果手动输入了 tag，则优先使用输入值
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            # 根据触发分支自动设置标签
            if [ "${{ github.ref_name }}" == "package" ]; then
              TAG="latest"
            else
              TAG="dev"      # 默认 dev 分支（或其他分支）
            fi
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ steps.vars.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LC }}:${{ steps.vars.outputs.tag }}-${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max