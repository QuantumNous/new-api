name: Release

# Push-to-main pipeline. Runs on every push to main:
#
#     compute-tag ──┐
#                   ├──> build-image ──> private registry
#     test ─────────┘
#
# - compute-tag derives v<YYYY.MM.DD>-<seq> and pushes the tag back.
# - test delegates to ci.yml so the same suite gates both PRs and releases.
# - build-image needs both a green test and the computed tag.
#
# Trigger: every push to main. workflow_dispatch allows rebuilding a
# specific historical commit or supplying a custom tag.

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: '可选：指定 IMAGE_TAG（留空则按 v<YYYY.MM.DD>-<seq> 自动生成）'
        required: false
        default: ''

permissions:
  contents: write
  packages: write

jobs:
  compute-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.derive.outputs.image_tag }}
    steps:
      - name: Checkout (with full tag history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive image tag (or honour dispatch input)
        id: derive
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail

          if [ -n "${DISPATCH_TAG}" ]; then
            echo "Using operator-supplied tag: ${DISPATCH_TAG}"
            echo "image_tag=${DISPATCH_TAG}" >> "$GITHUB_OUTPUT"
            echo "skip_push=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          today=$(date -u +%Y.%m.%d)
          prefix="v${today}"

          existing=$(git tag --list "${prefix}-*" | wc -l | tr -d ' ')
          idx=$((existing + 1))

          attempt=0
          while [ "${attempt}" -lt 50 ]; do
            candidate="${prefix}-${idx}"
            if git rev-parse --verify --quiet "refs/tags/${candidate}" >/dev/null; then
              idx=$((idx + 1))
              attempt=$((attempt + 1))
              continue
            fi
            break
          done

          image_tag="${prefix}-${idx}"
          echo "Derived tag: ${image_tag}"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "skip_push=false" >> "$GITHUB_OUTPUT"

      - name: Push tag back to origin
        if: steps.derive.outputs.skip_push == 'false'
        env:
          IMAGE_TAG: ${{ steps.derive.outputs.image_tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          short_sha="${GITHUB_SHA:0:7}"
          git tag -a "${IMAGE_TAG}" -m "Release ${IMAGE_TAG} (auto-generated from main@${short_sha})"
          git push origin "refs/tags/${IMAGE_TAG}"

  test:
    uses: ./.github/workflows/ci.yml

  build-image:
    needs: [compute-tag, test]
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.compute-tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Write VERSION file
        run: echo "${IMAGE_TAG}" > VERSION

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: "${{ vars.IMAGE_REGISTRY }}/new-api:${{ env.IMAGE_TAG }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to private registry
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -z "$REGISTRY_USERNAME" ]; then
            echo "REGISTRY_USERNAME unset -> assuming open registry, skipping login."
            exit 0
          fi
          registry_host="$(echo "${{ vars.IMAGE_REGISTRY }}" | cut -d/ -f1)"
          echo "$REGISTRY_PASSWORD" | docker login "$registry_host" \
            --username "$REGISTRY_USERNAME" --password-stdin

      - name: Push to private registry
        run: |
          docker push "${{ vars.IMAGE_REGISTRY }}/new-api:${IMAGE_TAG}"

      - name: Log out of private registry
        if: always()
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        run: |
          if [ -z "$REGISTRY_USERNAME" ]; then
            exit 0
          fi
          registry_host="$(echo "${{ vars.IMAGE_REGISTRY }}" | cut -d/ -f1)"
          docker logout "$registry_host" || true

      - name: Image summary
        run: |
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ vars.IMAGE_REGISTRY }}/new-api:${IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
