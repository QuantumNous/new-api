name: Sync base images to ACR

# 手动触发，只需要跑一次（或需要更新基础镜像版本时再跑）
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to ACR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Sync postgres:15
        run: |
          docker pull postgres:15
          docker tag postgres:15 ${{ secrets.ACR_REGISTRY }}/reputationly/postgres:15
          docker push ${{ secrets.ACR_REGISTRY }}/reputationly/postgres:15

      - name: Sync redis:latest
        run: |
          docker pull redis:latest
          docker tag redis:latest ${{ secrets.ACR_REGISTRY }}/reputationly/redis:latest
          docker push ${{ secrets.ACR_REGISTRY }}/reputationly/redis:latest

      - name: Sync containrrr/watchtower:latest
        run: |
          docker pull containrrr/watchtower:latest
          docker tag containrrr/watchtower:latest ${{ secrets.ACR_REGISTRY }}/reputationly/watchtower:latest
          docker push ${{ secrets.ACR_REGISTRY }}/reputationly/watchtower:latest

      - name: Sync umami:postgresql-latest
        run: |
          docker pull ghcr.io/umami-software/umami:postgresql-latest
          docker tag ghcr.io/umami-software/umami:postgresql-latest ${{ secrets.ACR_REGISTRY }}/reputationly/umami:latest
          docker push ${{ secrets.ACR_REGISTRY }}/reputationly/umami:latest

      - name: Sync louislam/uptime-kuma:latest
        # 保持 :latest（Kuma 维护者把 :latest 永久停在 1.23.17，这正是本项目想要的）。
        # 2.x 已 GA 但本项目不需要其新特性，留在 1.x 避免数据迁移风险。
        run: |
          docker pull louislam/uptime-kuma:latest
          docker tag louislam/uptime-kuma:latest ${{ secrets.ACR_REGISTRY }}/reputationly/uptime-kuma:latest
          docker push ${{ secrets.ACR_REGISTRY }}/reputationly/uptime-kuma:latest
