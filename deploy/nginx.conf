# OpenAPI Nginx Reverse Proxy Configuration
# 放置于 /etc/nginx/conf.d/openapi.conf 或 include 到 nginx.conf
#
# 功能：
# - 静态资源缓存 + gzip 压缩
# - HTTP/2 支持
# - SSE 流式响应透传
# - WebSocket 支持（realtime API）
# - 安全头部

upstream openapi_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # 如需 HTTPS，取消下面注释并配置证书
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate     /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;

    # ── 全局 gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── 安全头部 ──
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── 静态资源（长期缓存）──
    # Vite 构建的 assets 文件名含 hash，可以安全地长期缓存
    location /assets/ {
        proxy_pass http://openapi_backend;
        proxy_set_header Host $host;

        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── 静态文件（favicon, logo 等）──
    location ~* \.(ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|css|js)$ {
        proxy_pass http://openapi_backend;
        proxy_set_header Host $host;

        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── SSE 流式响应（chat completions 等）──
    # 关键：关闭 proxy_buffering，否则 SSE 会被缓冲导致延迟
    location ~ ^/v1/(chat/completions|completions|messages|responses) {
        proxy_pass http://openapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # SSE 关键配置
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # ── WebSocket（realtime API）──
    location /v1/realtime {
        proxy_pass http://openapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── API 请求 ──
    location /api/ {
        proxy_pass http://openapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ── 其他所有请求（relay、页面等）──
    location / {
        proxy_pass http://openapi_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 非流式请求允许缓冲
        proxy_buffering on;
        proxy_read_timeout 120s;
    }

    # ── 请求体大小限制 ──
    client_max_body_size 50m;
}
