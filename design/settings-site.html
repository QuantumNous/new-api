    <div class="form-group"><label class="form-label">站点名称</label><input type="text" class="form-input" value="API Gateway"></div>
    <div class="form-group"><label class="form-label">站点副标题</label><input type="text" class="form-input" value="AI API 统一接入平台"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Logo URL</label><input type="url" class="form-input" placeholder="https://…"></div>
    <div class="form-group"><label class="form-label">Favicon URL</label><input type="url" class="form-input" placeholder="https://…"></div>
  </div>
</div>

<div class="settings-card">
  <div class="settings-card-title">首页内容</div>
  <p class="settings-card-desc">首页 Hero 区域的标题和描述（支持 Markdown）</p>
  <div class="form-group"><label class="form-label">首页标题</label><input type="text" class="form-input" value="统一接入全球顶级 AI 模型"></div>
  <div class="form-group"><label class="form-label">首页描述</label><textarea class="form-textarea">一站式管理 OpenAI、Anthropic、Google 等主流大模型 API。智能负载均衡、统一计费、实时监控，让 AI 集成更简单。</textarea></div>
  <div class="form-group"><label class="form-label">首页按钮链接</label><input type="text" class="form-input" value="/register"></div>
</div>

<div class="settings-card">
  <div class="settings-card-title">页脚信息</div>
  <div class="form-group"><label class="form-label">版权信息</label><input type="text" class="form-input" value="© 2026 API Gateway. All rights reserved."></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">ICP 备案号</label><input type="text" class="form-input" placeholder="京ICP备XXXXXXXX号"></div>
    <div class="form-group"><label class="form-label">联系邮箱</label><input type="email" class="form-input" value="contact@example.com"></div>
  </div>
  <div class="form-group"><label class="form-label">自定义页脚脚本</label><textarea class="form-textarea" placeholder="<script>…</script>"></textarea><p class="form-help">谨慎添加第三方脚本</p></div>
</div>

<div style="display:flex;justify-content:flex-end;gap:var(--space-2);margin-top:var(--space-4)">

  <button class="btn btn-primary" onclick="Toast.show('success','站点设置已保存')">保存更改</button>
</div>
