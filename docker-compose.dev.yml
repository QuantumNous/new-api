# Local dev stack: backend + frontend dev server (both auto-restart in Docker).
#
# Quick start:
#   ./scripts/dev/start-dev-stack.sh
#   # or: docker compose -f docker-compose.dev.yml up -d --build
#
# URLs:
#   - UI:  http://localhost:3001  (Rsbuild, proxies /api to new-api:3000)
#   - API: http://localhost:3000
#
# Rebuild after Go changes:
#   docker compose -f docker-compose.dev.yml up -d --build new-api
#
# Rebuild after frontend dependency changes:
#   docker compose -f docker-compose.dev.yml up -d --build web-dev
#
# Logs:
#   docker compose -f docker-compose.dev.yml logs -f web-dev
#
# Stop:
#   docker compose -f docker-compose.dev.yml down
#
# Reset data:
#   docker compose -f docker-compose.dev.yml down -v

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: new-api-dev:local
    container_name: new-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - dev_data:/data
    environment:
      - SQL_DSN=postgresql://root:123456@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - BATCH_UPDATE_ENABLED=true
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - dev-network

  web-dev:
    build:
      context: ./web/default
      dockerfile: Dockerfile.dev
    image: new-api-web-dev:local
    container_name: new-api-dev-web
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - VITE_REACT_APP_SERVER_URL=http://new-api:3000
    volumes:
      - ./web/default:/app
      - web_dev_node_modules:/app/node_modules
    depends_on:
      new-api:
        condition: service_started
    networks:
      - dev-network

  redis:
    image: redis:7-alpine
    container_name: new-api-dev-redis
    restart: unless-stopped
    networks:
      - dev-network

  postgres:
    image: postgres:15-alpine
    container_name: new-api-dev-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: new-api
    volumes:
      - dev_pg_data:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dev_data:
  dev_pg_data:
  web_dev_node_modules:

networks:
  dev-network:
    driver: bridge
