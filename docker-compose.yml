# New-API Docker Compose Configuration
#
# Quick Start:
#   1. docker-compose up -d
#   2. Access at http://localhost:3000
#
# This compose file is tuned for AWS c5.xlarge with AWS RDS PostgreSQL.
# Put secrets in .env instead of committing them in this file.

services:
  new-api:
    image: ghcr.io/sulishi2011/new-api:custom-main
    container_name: new-api
    restart: always
    command: ["--log-dir", ""]
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      SQL_DSN: postgresql://${AWS_RDS_USER:-admin}:${AWS_RDS_PASSWORD:?set AWS_RDS_PASSWORD}@ai-new-api.cstcaqeoq6o8.us-east-1.rds.amazonaws.com:5432/${AWS_RDS_APP_DB:-new-api}?sslmode=require
      LOG_SQL_DSN: postgresql://${AWS_RDS_USER:-admin}:${AWS_RDS_PASSWORD:?set AWS_RDS_PASSWORD}@ai-new-api.cstcaqeoq6o8.us-east-1.rds.amazonaws.com:5432/${AWS_RDS_LOG_DB:-new-api-logs}?sslmode=require
      SQL_READ_DSN: postgresql://${AWS_RDS_USER:-admin}:${AWS_RDS_PASSWORD:?set AWS_RDS_PASSWORD}@ai-new-api-slave1.cstcaqeoq6o8.us-east-1.rds.amazonaws.com:5432/${AWS_RDS_APP_DB:-new-api}?sslmode=require
      LOG_SQL_READ_DSN: postgresql://${AWS_RDS_USER:-admin}:${AWS_RDS_PASSWORD:?set AWS_RDS_PASSWORD}@ai-new-api-slave1.cstcaqeoq6o8.us-east-1.rds.amazonaws.com:5432/${AWS_RDS_LOG_DB:-new-api-logs}?sslmode=require
      REDIS_CONN_STRING: redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD}@redis:6379/0
      TZ: Asia/Shanghai
      GIN_MODE: release
      DEBUG: "false"
      ERROR_LOG_ENABLED: "false"
      DIFY_DEBUG: "false"
      BATCH_UPDATE_ENABLED: "true"
      BATCH_UPDATE_INTERVAL: "10"
      NODE_NAME: new-api-node-1
      SQL_MAX_IDLE_CONNS: "10"
      SQL_MAX_OPEN_CONNS: "40"
      SQL_MAX_LIFETIME: "300"
      REDIS_POOL_SIZE: "20"
      RELAY_MAX_IDLE_CONNS: "200"
      RELAY_MAX_IDLE_CONNS_PER_HOST: "50"
      MAX_REQUEST_BODY_MB: "32"
      STREAM_SCANNER_MAX_BUFFER_MB: "64"
      TASK_QUERY_LIMIT: "100"
    depends_on:
      - redis
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis:7
    container_name: redis
    restart: always
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?set REDIS_PASSWORD}
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    networks:
      - new-api-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"

networks:
  new-api-network:
    driver: bridge
