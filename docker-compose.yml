# router-ai-atius Docker Compose — rebrand v2.11.0
#
# Quick Start (production):
#   1. cp .env.example .env  (or use existing .env)
#   2. docker compose up -d
#   3. Access at http://localhost:3000
#
# Database: Postgres 15 (single instance, persists in ./db-data)
# Image:    ghcr.io/giovannimnz/router-ai-atius:v2.11.0-rebrand.20260602
# DB name:  DBRouterAiAtius (was: newapi)
#
# Replaces the legacy "new-api" container name and "newapi" database.
# The legacy `newapi` database is preserved on the same Postgres server
# for 7-14 days as a rollback safety net.
#
# ⚠️  IMPORTANT: Change all default passwords before deploying to production!

services:
  router-ai-atius:
    image: ghcr.io/giovannimnz/router-ai-atius:v2.11.0-rebrand.20260602
    container_name: router-ai-atius
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://admin:${POSTGRES_PASSWORD}@router-ai-atius-db:5432/DBRouterAiAtius?sslmode=disable
      - REDIS_CONN_STRING=redis://:123456@redis:6379
      - TZ=America/Sao_Paulo
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=router-ai-atius-node-1
      - SESSION_SECRET=${SESSION_SECRET}
      - TRUST_PROXY=true
    depends_on:
      redis:
        condition: service_started
      router-ai-atius-db:
        condition: service_healthy
    networks:
      - router-ai-atius-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  router-ai-atius-db:
    image: postgres:15-alpine
    container_name: router-ai-atius-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: DBRouterAiAtius
      TZ: America/Sao_Paulo
    volumes:
      - ./db-data:/var/lib/postgresql/data
    networks:
      - router-ai-atius-internal
    ports:
      - "5432:5432"  # Exposed for host-side pg_dump/pg_restore
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d DBRouterAiAtius"]
      interval: 30s
      timeout: 10s
      retries: 3

  model-detailed:
    image: ghcr.io/giovannimnz/router-ai-atius-model-detailed:latest
    container_name: router-ai-atius-model-detailed
    restart: always
    ports:
      - "3300:3300"
    networks:
      - router-ai-atius-internal

  redis:
    image: redis:latest
    container_name: router-ai-atius-redis
    restart: always
    command: ["redis-server", "--requirepass", "123456"]
    networks:
      - router-ai-atius-internal

networks:
  router-ai-atius-internal:
    driver: bridge
