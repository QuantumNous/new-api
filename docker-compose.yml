# New-API Docker Compose Configuration (Local Development)
#
# Quick Start:
#   1. Copy .env.example to .env and configure your environment variables
#   2. docker-compose up -d --build
#   3. Access at http://localhost:${PORT:-3000}
#
# Using MySQL instead of PostgreSQL:
#   1. Set DB_TYPE=mysql in .env
#   2. Comment out postgres service and uncomment mysql service
#
# ⚠️  IMPORTANT: Configure .env file before running!

version: '3.4'

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=${SQL_DSN}
      - REDIS_CONN_STRING=${REDIS_CONN_STRING:-redis://redis}
      - TZ=${TZ:-Asia/Shanghai}
      - ERROR_LOG_ENABLED=${ERROR_LOG_ENABLED:-true}
      - BATCH_UPDATE_ENABLED=${BATCH_UPDATE_ENABLED:-true}
      - STREAMING_TIMEOUT=${STREAMING_TIMEOUT}
      - SESSION_SECRET=${SESSION_SECRET}
      - SYNC_FREQUENCY=${SYNC_FREQUENCY}
      - GOOGLE_ANALYTICS_ID=${GOOGLE_ANALYTICS_ID}
      - UMAMI_WEBSITE_ID=${UMAMI_WEBSITE_ID}
      - UMAMI_SCRIPT_URL=${UMAMI_SCRIPT_URL}
    depends_on:
      - redis
      - postgres
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-new-api}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network

