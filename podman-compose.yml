# router-ai-atius — Podman compose (rebrand v2.11.0)
#
# Drop-in equivalent of docker-compose.yml that runs natively on rootless
# Podman (no docker daemon required). Same service layout, same ports,
# same data paths — the only differences are:
#
#   - "version" is dropped (Compose Spec 1.0+, no longer required).
#   - `podman-compose` is the orchestrator; the project is run with:
#       podman-compose -f podman-compose.yml up -d
#   - For native systemd integration, use podman/quadlets/* (preferred
#     for production; survives reboots and integrates with logind).
#   - All commands are compatible with `docker compose` as well, since
#     podman-compose reads the same Compose Spec and Docker/Podman are
#     CLI-compatible for the operations we use here.
#
# Quick Start:
#   1. ./scripts/podman-up.sh         (builds + starts in foreground-less mode)
#   2. curl http://localhost:3301/api/status   (verify)
#
# Migration from Docker:
#   ./scripts/podman-migrate-from-docker.sh   (one-shot)
#
# REBRAND v2.11.0:
#   - container new-api        → router-ai-atius
#   - container db-newapi      → router-ai-atius-db
#   - container redis-newapi   → router-ai-atius-redis
#   - container model-detailed → router-ai-atius-model-detailed
#   - network new-api-network  → router-ai-atius-internal
#   - DB name newapi           → DBRouterAiAtius
#   - Image tag :local         → v2.11.0-rebrand.20260602 (GHCR)

services:
  router-ai-atius:
    image: ghcr.io/giovannimnz/router-ai-atius:v2.11.0-rebrand.20260602
    container_name: router-ai-atius
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3301:3000"  # host:container — 3301 to match the Apache ProxyPass upstream
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=postgresql://admin:${POSTGRES_PASSWORD:?set in .env}@router-ai-atius-db:5432/DBRouterAiAtius?sslmode=disable
      - REDIS_CONN_STRING=redis://:${REDIS_PASSWORD:?set in .env}@router-ai-atius-redis:6379
      - TZ=America/Sao_Paulo
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=router-ai-atius-podman
      - SESSION_SECRET=${SESSION_SECRET:?set in .env}
      - TRUST_PROXY=true
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - router-ai-atius-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  model-detailed:
    build:
      context: .
      dockerfile: integration/middleware/Dockerfile.fastapi
    image: ghcr.io/giovannimnz/router-ai-atius-model-detailed:latest
    container_name: router-ai-atius-model-detailed
    restart: always
    environment:
      - MIDDLEWARE_PORT=3001
      - ROUTER_AI_ATIUS_BACKEND_URL=http://router-ai-atius:3000
      - BACKEND_TIMEOUT=60
      - DOCS_USERNAME=${DOCS_USERNAME:?set in .env}
      - DOCS_PASSWORD=${DOCS_PASSWORD:?set in .env}
      - OPENAPI_SPEC_PATH=/app/docs/openapi.json
      - STATIC_FILES_PATH=/app/static
      - SESSION_SECRET=${SESSION_SECRET:?set in .env}
    ports:
      - "3300:3001"  # host 3300 → container 3001 (FastAPI uvicorn)
    volumes:
      - ./integration/middleware/static:/app/static:ro
      - ./integration/middleware/docs:/app/docs:ro
    depends_on:
      router-ai-atius:
        condition: service_healthy
    networks:
      - router-ai-atius-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3001/health | grep -o '\"status\":\"healthy\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: router-ai-atius-redis
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set in .env}"]
    networks:
      - router-ai-atius-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?set in .env}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: docker.io/library/postgres:15-alpine
    container_name: router-ai-atius-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: DBRouterAiAtius
      TZ: America/Sao_Paulo
    volumes:
      - ./db-data:/var/lib/postgresql/data
    networks:
      - router-ai-atius-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d DBRouterAiAtius"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pg_data:

networks:
  router-ai-atius-internal:
    driver: bridge
