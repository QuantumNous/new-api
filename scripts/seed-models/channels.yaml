      - gpt-4.1-mini
      - gpt-4.1-nano
      # GPT-4o 系列
      - gpt-4o
      - gpt-4o-mini
      - chatgpt-4o-latest
      - gpt-4o-audio-preview
      - gpt-4o-realtime-preview
      - gpt-4o-mini-realtime-preview
      # 推理系列 o-family
      - o3
      - o3-mini
      - o3-pro
      - o4-mini
      # 多模态生成
      - gpt-image-1
      - dall-e-3
      - dall-e-2
      # 语音
