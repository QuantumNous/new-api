# DeepRouter — Seed Models Configuration
#
# 用法：scripts/seed-models/seed.py 读取本文件，调用 admin API 自动建/更新所有 channel。
# 关键约定：
#   - `key_env` 指向环境变量名；上游 API key 从环境读取，不写在本文件
#   - `enabled: false` 的 channel 不会被创建/更新
#   - `name` 是幂等键（同名 channel 会被更新而不是重复创建）
#   - 模型 `models` 是 new-api 已经内置定价的型号；陌生型号会落到默认 ratio (1.0 = $0.002/1K)
#   - `type` 数字来自 constant/channel.go 的 ChannelType* 枚举

version: 1

defaults:
  group: default
  priority: 100
  weight: 10
  status: enabled      # enabled | disabled
  mode: single         # single | batch | multi_to_single

channels:

  # ─────────────────────────────────────────────────────────────────────
  # 国际大模型厂商（International）
  # ─────────────────────────────────────────────────────────────────────

  - name: OpenAI
    type: 1
    enabled: true
    key_env: OPENAI_API_KEY
    base_url: https://api.openai.com
    test_model: gpt-4o-mini
    tag: openai
    models:
      # GPT-5 系列
      - gpt-5
      - gpt-5-mini
      - gpt-5-nano
      - gpt-5-chat-latest
      # GPT-4.1 系列
