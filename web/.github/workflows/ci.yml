name: CI Pipeline  # 工作流名称

# 触发条件：当推送到main分支时触发 [citation:5]
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  USERNAME: deployer

# 定义要执行的任务
jobs:
  build:
    runs-on: ubuntu-latest  # 使用最新的Ubuntu环境
    defaults:
      run:
        working-directory: ./web
    
    # 定义步骤
    steps:
      - name: 检出代码
        uses: actions/checkout@v4  # 将你的代码拉取到CI环境中
        
      - name: 设置Node.js 24环境
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web/package-lock.json
          
      - name: 安装依赖
        run: npm ci
        
      - name: 构建项目
        run: npm run build  # 执行构建，生成dist文件夹
        env:
          # 如果有环境变量，在这里设置
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        
          
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: web/dist/  # 上传dist文件夹，可供后续部署使用

      - name: 部署到服务器
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_IP }}
          port: 22
          username: ${{ env.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: web/dist/*
          target: /opt/www/meeyo
          overwrite: true