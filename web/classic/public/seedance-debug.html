<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seedance 视频工作室</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090b10;
      --panel: #11141c;
      --panel-2: #171c27;
      --panel-3: #202637;
      --line: #303748;
      --text: #f4f6fb;
      --muted: #9da7b8;
      --soft: #dbe1ec;
      --accent: #1fd36d;
      --accent-2: #5f8cff;
      --danger: #ff6377;
      --sidebar: 420px;
      --header-h: 58px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 16% 0, rgba(31, 211, 109, .14), transparent 28%),
        radial-gradient(circle at 88% 6%, rgba(95, 140, 255, .12), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    button, input, textarea, select { font: inherit; }
    button {
      border: 0; border-radius: 8px; color: var(--text); cursor: pointer;
      font-weight: 700; padding: 9px 12px; white-space: nowrap;
    }
    button:disabled { cursor: not-allowed; opacity: .55; }
    input, textarea, select {
      width: 100%; border: 1px solid var(--line); border-radius: 8px;
      background: var(--panel-2); color: var(--text); outline: none; padding: 10px 11px;
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(95, 140, 255, .14);
    }
    a { color: #9fc8ff; }
    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: var(--header-h) minmax(0, 1fr);
    }
    .top {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(17,20,28,.92);
      backdrop-filter: blur(10px);
    }
    .brand { display: flex; gap: 11px; align-items: center; min-width: 0; }
    .logo {
      min-width: 78px; padding: 0 10px; height: 34px; border-radius: 8px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #041109; font-weight: 900; font-size: 13px;
    }
    h1 { margin: 0; font-size: 16px; }
    h2 { margin: 0 0 10px; font-size: 14px; }
    h3 { margin: 0 0 8px; font-size: 13px; color: var(--soft); }
    .sub { margin: 1px 0 0; color: var(--muted); font-size: 12px; }
    .top-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .auth-chip {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--line); border-radius: 999px;
      padding: 6px 11px; font-size: 12px; color: var(--soft);
      background: rgba(23,28,39,.8);
    }
    .auth-chip.ok { border-color: rgba(31,211,109,.35); color: #7de6aa; }
    .auth-chip.warn { border-color: rgba(255,210,124,.35); color: #ffd27c; }
    .workspace {
      display: grid;
      grid-template-columns: var(--sidebar) minmax(0, 1fr);
      min-height: 0;
    }
    .create-panel, .history-panel {
      min-height: 0; overflow: auto;
      border-right: 1px solid rgba(255,255,255,.07);
    }
    .history-panel { border-right: 0; padding: 14px 16px 24px; }
    .create-panel {
      display: flex; flex-direction: column; gap: 12px;
      padding: 12px 14px 20px;
      background: rgba(17,20,28,.72);
    }
    .section {
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px;
      background: rgba(23,28,39,.45);
      padding: 12px;
    }
    .field { margin-bottom: 10px; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; margin: 0 0 6px; color: var(--muted); font-size: 12px; }
    .hint { margin: 6px 0 0; color: var(--muted); font-size: 11px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .actions { display: flex; flex-wrap: wrap; gap: 7px; }
    .primary { background: var(--accent); color: #03120a; }
    .secondary { background: var(--panel-3); }
    .ghost { background: transparent; border: 1px solid var(--line); }
    .danger { background: #3b1f2c; color: #ffb3bf; }
    a.ghost, a.secondary {
      text-decoration: none; display: inline-flex; align-items: center;
      border: 1px solid var(--line); border-radius: 8px; padding: 8px 11px;
      color: var(--text); font-weight: 700; font-size: 13px;
    }
    .settings-compact {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .settings-compact .field { margin: 0; }
    .generate {
      width: 100%; padding: 13px 16px; font-size: 15px; margin-top: 2px;
    }
    .status-box {
      min-height: 38px; border: 1px solid #283346; border-radius: 8px;
      background: #080c14; color: #cbd4e5; padding: 9px 11px; font-size: 12px;
      white-space: pre-wrap; word-break: break-word;
    }
    .status-box.ok { color: #7de6aa; }
    .status-box.bad { color: #ff9baa; }
    .status-box.warn { color: #ffd27c; }
    .upload {
      display: grid; gap: 6px; place-items: center; min-height: 84px;
      border: 1px dashed #465166; border-radius: 8px;
      background: rgba(23,28,39,.72); color: var(--muted);
      text-align: center; padding: 12px; cursor: pointer;
    }
    .upload input { display: none; }
    .upload strong { color: var(--soft); font-size: 13px; }
    .face-pass {
      position: relative;
      display: inline-flex; align-items: center; gap: 8px;
      margin: 0 0 10px; color: var(--soft); font-size: 13px;
      cursor: help; user-select: none;
    }
    .face-pass input { width: auto; margin: 0; accent-color: var(--accent); cursor: pointer; }
    .face-pass .tip {
      position: absolute; left: 0; bottom: calc(100% + 8px); z-index: 20;
      width: min(260px, 72vw); padding: 9px 11px;
      border: 1px solid var(--line); border-radius: 8px; background: #1a2130;
      color: var(--soft); font-size: 12px; line-height: 1.45;
      box-shadow: 0 10px 28px rgba(0,0,0,.35);
      opacity: 0; pointer-events: none; transform: translateY(4px);
      transition: opacity .15s ease, transform .15s ease;
    }
    .face-pass:hover .tip, .face-pass:focus-within .tip { opacity: 1; transform: translateY(0); }
    .asset-list { display: grid; gap: 8px; max-height: 220px; overflow: auto; margin-top: 8px; }
    .asset {
      display: grid; grid-template-columns: 52px minmax(0,1fr); gap: 8px;
      border: 1px solid var(--line); border-radius: 8px;
      background: rgba(23,28,39,.72); padding: 7px;
    }
    .asset-preview {
      width: 52px; height: 52px; border-radius: 7px; border: 1px solid #343c4e;
      overflow: hidden; display: grid; place-items: center; background: #080c13;
      color: var(--muted); font-size: 11px;
    }
    .asset-preview img, .asset-preview video { width: 100%; height: 100%; object-fit: cover; }
    .asset-meta { min-width: 0; }
    .asset-tag {
      display: inline-flex; align-items: center; gap: 4px;
      margin-bottom: 5px; padding: 3px 8px; border-radius: 999px;
      border: 1px solid #49617f; background: #202a3a; color: var(--soft);
      font-size: 12px; font-weight: 700;
    }
    .asset-tools { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
    .asset-tools button { padding: 5px 7px; font-size: 11px; }
    .asset-status { font-size: 10px; color: var(--muted); word-break: break-all; }
    .asset-status.ok { color: #7de6aa; }
    .asset-status.bad { color: #ff9baa; }
    .asset-status.warn { color: #ffd27c; }
    .prompt-wrap { position: relative; }
    .prompt-editor {
      width: 100%; height: 140px; max-height: 180px; border: 1px solid var(--line); border-radius: 8px;
      background: var(--panel-2); color: var(--text); outline: none; padding: 10px;
      overflow-x: hidden; overflow-y: auto; white-space: pre-wrap; word-break: break-word;
      overscroll-behavior: contain; font-size: 13px;
    }
    .prompt-editor:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(95, 140, 255, .14);
    }
    .prompt-editor:empty::before {
      content: attr(data-placeholder); color: var(--muted); pointer-events: none;
    }
    .prompt-mention {
      display: inline-flex; align-items: center; gap: 4px;
      max-width: min(220px, 100%); margin: 0 2px 2px 0;
      padding: 1px 6px 1px 3px; border: 1px solid #49617f; border-radius: 6px;
      background: #202a3a; color: #f4f6fb; font-size: .95em; vertical-align: middle;
      user-select: none; white-space: nowrap;
    }
    .prompt-mention img, .prompt-mention video {
      width: 16px; height: 16px; border-radius: 4px; object-fit: cover; background: #080c13;
    }
    .mention-menu {
      display: none; position: fixed; z-index: 40;
      width: min(320px, calc(100vw - 24px)); max-height: min(260px, 45vh); overflow: auto;
      border: 1px solid var(--line); border-radius: 8px; background: #101520;
      box-shadow: 0 18px 60px rgba(0,0,0,.45); padding: 7px;
    }
    .mention-menu.show { display: grid; gap: 5px; }
    .mention-item {
      display: grid; grid-template-columns: 40px minmax(0,1fr); gap: 8px;
      padding: 6px; border-radius: 8px; cursor: pointer;
    }
    .mention-item:hover { background: var(--panel-3); }
    .mention-thumb {
      width: 40px; height: 40px; border-radius: 7px; background: #080c13;
      display: grid; place-items: center; overflow: hidden; color: var(--muted); font-size: 11px;
    }
    .mention-thumb img, .mention-thumb video { width: 100%; height: 100%; object-fit: cover; }
    .mention-title { color: var(--soft); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mention-sub { color: var(--muted); font-size: 11px; }
    .ref-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .ref-pill {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid #394357; border-radius: 999px; background: rgba(32,38,55,.82);
      padding: 4px 8px 4px 4px; color: var(--soft); font-size: 12px;
    }
    .ref-thumb {
      width: 22px; height: 22px; border-radius: 50%; border: 1px solid #465166;
      display: grid; place-items: center; overflow: hidden; background: #080c13;
      color: var(--muted); font-size: 9px;
    }
    .ref-thumb img, .ref-thumb video { width: 100%; height: 100%; object-fit: cover; }
    .advanced details {
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px;
      background: rgba(23,28,39,.35);
      padding: 0;
    }
    .advanced summary {
      cursor: pointer; list-style: none; padding: 11px 12px;
      color: var(--soft); font-weight: 700; font-size: 13px;
      user-select: none;
    }
    .advanced summary::-webkit-details-marker { display: none; }
    .advanced summary::after { content: "▾"; float: right; color: var(--muted); }
    .advanced details[open] summary::after { content: "▴"; }
    .advanced-body { padding: 0 12px 12px; }
    .payload-box {
      width: 100%; min-height: 110px; font-family: ui-monospace, Consolas, monospace;
      font-size: 11px; resize: vertical;
    }
    .model-hint {
      border: 1px solid #394357; border-radius: 8px; background: rgba(32,38,55,.55);
      padding: 8px 10px; color: var(--muted); font-size: 11px; margin-top: 8px;
    }
    .history-head {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      margin-bottom: 12px;
    }
    .history-head h2 { margin: 0; font-size: 16px; }
    .history-count { color: var(--muted); font-size: 12px; }
    .running-list { display: grid; gap: 10px; margin-bottom: 16px; }
    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
    }
    .hist-card {
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 12px;
      background: rgba(17,20,28,.88);
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .hist-card.running {
      border-color: rgba(95,140,255,.35);
      background: linear-gradient(180deg, rgba(95,140,255,.08), rgba(17,20,28,.92));
    }
    .hist-media {
      position: relative; aspect-ratio: 16/9; background: #080c13;
      display: grid; place-items: center; overflow: hidden; color: var(--muted); font-size: 12px;
    }
    .hist-media video, .hist-media img { width: 100%; height: 100%; object-fit: cover; }
    .hist-body { padding: 10px 11px 11px; display: grid; gap: 8px; }
    .hist-prompt {
      font-size: 12px; color: var(--soft);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; min-height: 2.8em;
    }
    .hist-meta { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .task-badge {
      width: max-content; display: inline-flex; align-items: center; gap: 5px;
      border-radius: 999px; padding: 3px 9px; background: rgba(255,255,255,.08);
      color: var(--muted); font-size: 11px;
    }
    .task-badge::before {
      content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor;
    }
    .task-badge.ok { background: rgba(125,230,170,.12); color: #7de6aa; }
    .task-badge.bad { background: rgba(255,155,170,.12); color: #ff9baa; }
    .task-badge.warn { background: rgba(255,210,124,.12); color: #ffd27c; }
    .task-progress {
      height: 4px; border-radius: 999px; background: rgba(255,255,255,.11); overflow: hidden;
    }
    .task-progress span {
      display: block; width: var(--progress, 0%); height: 100%;
      border-radius: inherit; background: #27c65a;
    }
    .hist-actions { display: flex; flex-wrap: wrap; gap: 6px; }
    .hist-actions button { padding: 6px 8px; font-size: 11px; }
    .hist-empty {
      border: 1px dashed #394357; border-radius: 12px; padding: 36px 18px;
      text-align: center; color: var(--muted); font-size: 13px;
    }
    .modal {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(4,6,10,.78); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal.show { display: flex; }
    .modal-card {
      width: min(960px, 100%);
      border: 1px solid var(--line); border-radius: 12px;
      background: #11141c; padding: 14px; box-shadow: 0 24px 80px rgba(0,0,0,.45);
    }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px;
    }
    .modal-head h2 { margin: 0; }
    video#video {
      width: 100%; max-height: min(70vh, 560px); border: 1px solid var(--line);
      border-radius: 8px; background: #000;
    }
    .hidden { display: none !important; }
    @media (max-width: 980px) {
      .workspace { grid-template-columns: 1fr; }
      .create-panel { border-right: 0; border-bottom: 1px solid rgba(255,255,255,.07); max-height: none; }
      .app { height: auto; min-height: 100vh; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="brand">
        <div class="logo">Seedance</div>
        <div>
          <h1>Seedance 视频工作室</h1>
          <p class="sub">左栏创作 · 右栏历史 · Key 仅本机/会话内存</p>
        </div>
      </div>
      <div class="top-right">
        <span class="auth-chip warn" id="authChip">检测登录中…</span>
        <a class="ghost" id="loginLink" href="/login">去登录</a>
        <a class="ghost" href="/docs/seedance-4models.md">API 文档</a>
      </div>
    </header>

    <div class="workspace">
      <aside class="create-panel">
        <section class="section" id="accountSection">
          <h2>账号</h2>
          <div id="sessionAuth" class="hidden">
            <div class="field">
              <label for="tokenSelect">选择令牌</label>
              <select id="tokenSelect"></select>
              <p class="hint" id="tokenSelectHint">将从账号拉取完整 Key（仅内存，不落盘）。</p>
            </div>
          </div>
          <div id="guestAuth">
            <div class="field">
              <label for="token">API Key</label>
              <input id="token" type="password" placeholder="sk-..." autocomplete="off">
            </div>
            <div class="actions">
              <button class="secondary" id="saveKeyBtn" type="button">保存 Key</button>
              <button class="secondary" id="toggleKeyBtn" type="button">显示</button>
              <button class="danger" id="clearKeyBtn" type="button">清除</button>
            </div>
          </div>
        </section>

        <section class="section">
          <h2>模型</h2>
          <div class="field">
            <label for="model">选择模型（来自模型广场）</label>
            <select id="model"></select>
          </div>
          <div class="field hidden" id="customModelField">
            <label for="customModel">自定义模型 ID</label>
            <input id="customModel" type="text" placeholder="例如 wstar-seedance-2-fast / seedance2.0" autocomplete="off">
            <p class="hint">仅兼容旧配置，已不再使用。</p>
          </div>
          <div class="model-hint" id="modelHint"></div>
        </section>

        <section class="section">
          <h2>提示词</h2>
          <div class="prompt-wrap">
            <div class="prompt-editor" id="prompt" contenteditable="true" data-placeholder="描述画面、人物、动作、镜头。输入 @ 插入图片1 / 视频1。">一只橘猫在窗边打哈欠，电影感光线，高清画质。</div>
            <div class="mention-menu" id="mentionMenu"></div>
          </div>
          <div class="ref-list" id="refList"></div>
        </section>

        <section class="section">
          <h2>参考素材</h2>
          <label class="upload">
            <input id="assetFiles" type="file" accept="image/*,audio/*,video/*" multiple>
            <strong>上传参考素材</strong>
            <span>上传后全部作为参考传入模型；提示词里输入 @ 插入「图片1 / 视频1」。</span>
          </label>
          <div class="field" style="margin-top:10px">
            <label for="manualUrl">或粘贴公网素材 URL</label>
            <div class="actions">
              <input id="manualUrl" type="url" placeholder="https://...">
              <button class="secondary" id="addUrlBtn" type="button">添加</button>
            </div>
          </div>
          <div class="asset-list" id="assetList"></div>
        </section>

        <section class="section">
          <h2>常用参数</h2>
          <div class="settings-compact">
            <div class="field">
              <label for="duration">时长</label>
              <select id="duration"></select>
            </div>
            <div class="field">
              <label for="aspectRatio">比例</label>
              <select id="aspectRatio">
                <option value="16:9" selected>16:9</option>
                <option value="9:16">9:16</option>
                <option value="1:1">1:1</option>
              </select>
            </div>
            <div class="field" id="resolutionField">
              <label for="resolution">分辨率</label>
              <select id="resolution">
                <option value="480p">480p</option>
                <option value="720p" selected>720p</option>
                <option value="1080p">1080p</option>
              </select>
            </div>
            <div class="field" id="audioField">
              <label for="generateAudio">配音</label>
              <select id="generateAudio">
                <option value="1" selected>开启</option>
                <option value="0">关闭</option>
              </select>
            </div>
          </div>
        </section>

        <button class="primary generate" id="submitBtn" type="button">立即生成</button>
        <div class="status-box" id="statusBox">正在初始化…</div>
        <div class="actions">
          <button class="ghost" id="clearAllBtn" type="button">清空创作</button>
        </div>

        <div class="advanced">
          <details>
            <summary>高级设置</summary>
            <div class="advanced-body">
              <div class="field">
                <label for="apiBase">API Base URL</label>
                <input id="apiBase" type="url" placeholder="默认同源">
                <p class="hint" id="apiBaseHint">默认同源，可改成测试机地址。</p>
              </div>
              <div class="field">
                <label for="imageHost">图床上传地址</label>
                <input id="imageHost" type="url">
              </div>
              <div class="field">
                <label for="imageToken">图床 Token</label>
                <input id="imageToken" type="password" autocomplete="off">
              </div>
              <div class="actions field">
                <button class="secondary" id="saveImageBtn" type="button">保存图床</button>
                <button class="secondary" id="toggleImageTokenBtn" type="button">显示</button>
              </div>
              <label class="face-pass" for="facePass">
                <input id="facePass" type="checkbox">
                <span>过人脸审核</span>
                <span class="tip">针对某些不能过人脸的模型，我们的人脸处理技术帮你处理，满血版本不要勾选。</span>
              </label>
              <div class="field" id="modeField">
                <label for="mode">生成模式</label>
                <select id="mode">
                  <option value="text_to_video">文本生成</option>
                  <option value="image_to_video">首帧 / 图生</option>
                  <option value="reference_to_video" selected>全能参考</option>
                </select>
              </div>
              <div class="field" id="mingizSendField">
                <label for="mingizSend">素材发送方式</label>
                <select id="mingizSend">
                  <option value="multipart" selected>multipart 直传本地文件</option>
                  <option value="json">JSON + 图床 URL</option>
                </select>
              </div>
              <div class="field" id="watermarkField">
                <label for="watermark">水印</label>
                <select id="watermark">
                  <option value="0" selected>关闭</option>
                  <option value="1">开启</option>
                </select>
              </div>
              <div class="field">
                <label for="payloadPreview">请求体预览（可编辑后提交）</label>
                <textarea class="payload-box" id="payloadPreview" spellcheck="false"></textarea>

    function normalizeApiKey(raw) {
      let value = String(raw || "").replace(/^\uFEFF/, "").replace(/[\u200B-\u200D\uFEFF]/g, "").trim();
      value = value.replace(/^Bearer\s+/i, "").trim();
      return value.replace(/^['"]+|['"]+$/g, "").trim();
    }
    function withSkPrefix(raw) {
      const key = normalizeApiKey(raw);
      if (!key) return "";
      return /^sk-/i.test(key) ? key : `sk-${key}`;
    }

      if (authMode === "session") return withSkPrefix(sessionKey);

      if (n.includes("sd2-431") || n === "videos_stable") {
        return "sd2-431";

      if (n.includes("wstar") || n.includes("vyro")) return "wstar-seedance-2-fast";
      if (n.includes("mingiz") || /(^|[^a-z])sd2([^a-z]|$)/i.test(n) || n.includes("sd2-fast") || n.includes("sd2fast")) {
        return n.includes("fast") ? "sd2-fast" : "mingiz-sd2";
      }
      if (n.includes("lec-seedance")) return "lec-seedance-videos-stable";
      if (n.includes("seedance")) return "seedance2.0";
      return "seedance2.0";
    }

    async function fetchSessionKey(tokenId) {
      const res = await siteApi(`/api/token/${encodeURIComponent(tokenId)}/key`, { method: "POST" });
      const data = await readJson(res);
      if (!res.ok || data.success === false) {
        throw new Error(data.message || `获取令牌失败 HTTP ${res.status}`);
      }
      const raw = data.data?.key || data.key || "";
      sessionKey = withSkPrefix(raw);
      if (!sessionKey) throw new Error("令牌 Key 为空");
      saveLocal(STORAGE.tokenId, String(tokenId));
      return sessionKey;
    }

    async function loadUserTokens() {
      const res = await siteApi("/api/token/?p=1&size=100");
      const data = await readJson(res);
      if (!res.ok || data.success === false) {
        throw new Error(data.message || `拉取令牌列表失败 HTTP ${res.status}`);
      }
      const payload = data.data || data;
      const items = Array.isArray(payload) ? payload : (payload.items || []);
      tokenList = items.filter((t) => Number(t.status) === 1);
      els.tokenSelect.innerHTML = tokenList.length
        ? tokenList.map((t) => `<option value="${t.id}">${escapeHtml(t.name || ("令牌 #" + t.id))}</option>`).join("")
        : `<option value="">暂无可用令牌</option>`;
      if (!tokenList.length) {
        sessionKey = "";
        els.tokenSelectHint.textContent = "没有启用中的令牌，请先在控制台创建。";
        return;
      }
      const savedId = readLocal(STORAGE.tokenId);
      const preferred = tokenList.find((t) => String(t.id) === String(savedId)) || tokenList[0];
      els.tokenSelect.value = String(preferred.id);
      await fetchSessionKey(preferred.id);
      els.tokenSelectHint.textContent = `已选令牌 · Key 仅内存持有 · 共 ${tokenList.length} 个可用`;
    }

      try {
        const res = await siteApi("/api/user/self");
        const data = await readJson(res);
        const user = data.data || ((data.username || data.id) ? data : null);

          return;

      }

    function escapeHtml(s) {
      return String(s || "").replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[c]));
    }

    function readTasks() {
      try { return JSON.parse(readLocal(STORAGE.tasks) || "[]"); } catch { return []; }
    }
    function saveTasks(tasks) {
      saveLocal(STORAGE.tasks, JSON.stringify(tasks.slice(0, MAX_TASKS)));
    }
    function upsertTask(task) {
      const tasks = readTasks();
      const idx = tasks.findIndex((t) => t.id === task.id);
      let merged = task;
      if (idx >= 0) {
        merged = { ...tasks[idx], ...task };
        tasks.splice(idx, 1);
      }
      tasks.unshift(merged);
      saveTasks(tasks);
      renderTasks(tasks);
    }
    function deleteTask(taskId) {
      const tasks = readTasks().filter((t) => t.id !== taskId);
      saveTasks(tasks);
      if (currentTaskId === taskId) currentTaskId = "";
      renderTasks(tasks);
      ensurePolling();

      const text = params.prompt || task.prompt || "";
      els.prompt.textContent = text;
      updateRefs();
      scheduleRebuild();
      setStatus(`已回填「再做一条」参数（素材需重新上传）。`, "ok");
      els.prompt.scrollIntoView({ behavior: "smooth", block: "center" });

    function clampProgress(value) {
      const n = Number(String(value).replace("%", ""));
      if (!Number.isFinite(n)) return 0;
      return Math.max(0, Math.min(100, Math.round(n)));
    }
    function statusLabel(status) {
      const s = String(status || "").toUpperCase();
      if (["SUCCESS", "SUCCEEDED", "COMPLETED"].includes(s)) return "成功";
      if (["FAILURE", "FAILED", "ERROR"].includes(s)) return "失败";
      if (["IN_PROGRESS", "RUNNING", "PROCESSING"].includes(s)) return "生成中";
      if (["QUEUED", "SUBMITTED", "NOT_START", "PENDING"].includes(s)) return "排队中";
      return status || "未知";
    }
    function statusKind(status) {
      const s = String(status || "").toUpperCase();
      if (["SUCCESS", "SUCCEEDED", "COMPLETED"].includes(s)) return "ok";
      if (["FAILURE", "FAILED", "ERROR"].includes(s)) return "bad";
      if (["IN_PROGRESS", "RUNNING", "PROCESSING", "QUEUED", "PENDING", "SUBMITTED", "NOT_START"].includes(s)) return "warn";
      return "";
    }
    function isSuccess(status) {
      return ["SUCCESS", "SUCCEEDED", "COMPLETED"].includes(String(status || "").toUpperCase());
    }
    function isFailed(status) {
      return ["FAILURE", "FAILED", "ERROR"].includes(String(status || "").toUpperCase());
    }
    function isProcessing(status) {
      return !isSuccess(status) && !isFailed(status);
    }

      if (String(type).startsWith("image/")) return "image";
      if (String(type).startsWith("video/")) return "video";
      if (String(type).startsWith("audio/")) return "audio";
      const name = String((fileOrUrl && fileOrUrl.name) || fileOrUrl || "").toLowerCase();
      if (/\.(png|jpe?g|webp|gif|bmp)(\?|$)/.test(name)) return "image";
      if (/\.(mp4|mov|webm|mkv)(\?|$)/.test(name)) return "video";
      if (/\.(mp3|wav|aac|m4a)(\?|$)/.test(name)) return "audio";
      return "image";
    }
    function kindLabel(kind) {
      return { image: "图片", video: "视频", audio: "音频" }[kind] || kind;
    }
    function renumberAssetTags() {
      let imageCount = 0;
      let videoCount = 0;
      let audioCount = 0;
      assets.forEach((item) => {
        if (item.kind === "video") {
          videoCount += 1;
          item.tag = `视频${videoCount}`;
        } else if (item.kind === "audio") {
          audioCount += 1;
          item.tag = `音频${audioCount}`;
        } else {
          imageCount += 1;
          item.tag = `图片${imageCount}`;
        }
      });
      syncMentionLabels();
    }
    function syncMentionLabels() {
      els.prompt.querySelectorAll(".prompt-mention").forEach((node) => {
        const asset = assets.find((item) => item.id === node.dataset.id);
        if (!asset) {
          node.remove();
          return;
        }
        node.dataset.name = asset.tag;
        const label = node.querySelector("span:last-child") || node.querySelector("span");
        if (label && !label.matches("img, video")) label.textContent = "@" + asset.tag;
        else {
          const spans = [...node.querySelectorAll("span")];
          const textSpan = spans.find((s) => !s.querySelector("img, video"));
          if (textSpan) textSpan.textContent = "@" + asset.tag;
        }
      });
    }
    function findAssetByTag(tag) {
      return assets.find((item) => item.tag === tag || item.name === tag);
    }

    function promptText() {
      const clone = els.prompt.cloneNode(true);
      clone.querySelectorAll(".prompt-mention").forEach((node) => {
        node.replaceWith(document.createTextNode("@" + (node.dataset.name || "")));
      });
      return (clone.innerText || "").replace(/\u00a0/g, " ").trim();
    }
    function mentionedNames() {
      const names = new Set();
      els.prompt.querySelectorAll(".prompt-mention").forEach((node) => {
        if (node.dataset.name) names.add(node.dataset.name);
      });
      const re = /@([^\s@，,。；;：:]+)/g;
      let match;
      const text = promptText();
      while ((match = re.exec(text)) !== null) names.add(match[1]);
      return [...names];
    }
    function referencedAssets() {
      return mentionedNames().map((name) => ({ name, asset: findAssetByTag(name) }));
    }
    function getSubmitAssets() {
      // 已上传素材一律作为参考传入大模型；@ 仅影响提示词文案，不筛选素材列表
      return assets.slice();
    }

    function renderAssets() {
      renumberAssetTags();
      els.assetList.innerHTML = "";
      if (!assets.length) {
        const empty = document.createElement("p");
        empty.className = "hint";
        empty.textContent = "暂无素材。";
        els.assetList.appendChild(empty);
        renderMentionMenu();
        updateRefs();
        scheduleRebuild();
        return;
      }
      assets.forEach((asset) => {
        const row = document.createElement("div");
        row.className = "asset";
        const preview = document.createElement("div");
        preview.className = "asset-preview";
        if (asset.kind === "image" && asset.previewUrl) {
          const img = document.createElement("img");
          img.src = asset.previewUrl;
          img.alt = asset.tag;
          preview.appendChild(img);
        } else if (asset.kind === "video" && asset.previewUrl) {
          const video = document.createElement("video");
          video.src = asset.previewUrl;
          video.muted = true;
          preview.appendChild(video);
        } else {
          preview.textContent = kindLabel(asset.kind);
        }
        const meta = document.createElement("div");
        meta.className = "asset-meta";
        const tagEl = document.createElement("div");
        tagEl.className = "asset-tag";
        tagEl.textContent = "@" + asset.tag;
        const tools = document.createElement("div");
        tools.className = "asset-tools";
        const mentionBtn = document.createElement("button");
        mentionBtn.className = "secondary";
        mentionBtn.type = "button";
        mentionBtn.textContent = "@";
        mentionBtn.title = "插入到提示词";
        mentionBtn.onclick = () => insertMention(asset);
        const removeBtn = document.createElement("button");
        removeBtn.className = "danger";
        removeBtn.type = "button";
        removeBtn.textContent = "删除";
        removeBtn.onclick = () => removeAsset(asset.id);
        const status = document.createElement("span");
        const st = String(asset.uploadStatus || "");
        status.className = "asset-status " + (st === "ready" ? "ok" : st === "failed" ? "bad" : "warn");
        status.textContent = st === "uploading" ? (asset.viaFacePass ? "人脸处理中…" : "上传中…")
          : st === "ready" ? (asset.viaFacePass ? "已过人脸" : "已就绪")
          : st === "failed" ? ("失败: " + (asset.uploadError || ""))
          : st === "local" ? "本地文件（可 multipart）"
          : "待处理";
        tools.appendChild(mentionBtn);
        tools.appendChild(removeBtn);
        tools.appendChild(status);
        meta.appendChild(tagEl);
        meta.appendChild(tools);
        row.appendChild(preview);
        row.appendChild(meta);
        els.assetList.appendChild(row);
      });
      renderMentionMenu();
      updateRefs();
      scheduleRebuild();
    }

    function renderMentionMenu() {
      els.mentionMenu.innerHTML = "";
      if (!assets.length) {
        const empty = document.createElement("div");
        empty.className = "mention-sub";
        empty.textContent = "暂无素材可引用";
        empty.style.padding = "8px";
        els.mentionMenu.appendChild(empty);
        return;
      }
      assets.forEach((asset) => {
        const item = document.createElement("div");
        item.className = "mention-item";
        const thumb = document.createElement("div");
        thumb.className = "mention-thumb";
        if (asset.kind === "image" && asset.previewUrl) {
          const img = document.createElement("img");
          img.src = asset.previewUrl;
          thumb.appendChild(img);
        } else if (asset.kind === "video" && asset.previewUrl) {
          const video = document.createElement("video");
          video.src = asset.previewUrl;
          video.muted = true;
          thumb.appendChild(video);
        } else {
          thumb.textContent = kindLabel(asset.kind);
        }
        const info = document.createElement("div");
        const title = document.createElement("div");
        title.className = "mention-title";
        title.textContent = "@" + asset.tag;
        const sub = document.createElement("div");
        sub.className = "mention-sub";
        sub.textContent = "将作为参考传入模型";
        info.appendChild(title);
        info.appendChild(sub);
        item.appendChild(thumb);
        item.appendChild(info);
        item.onclick = () => {
          insertMention(asset);
          hideMentionMenu();
        };
        els.mentionMenu.appendChild(item);
      });
    }

    function removeAsset(id) {
      const asset = assets.find((a) => a.id === id);
      if (asset?.previewUrl && asset.previewUrl.startsWith("blob:")) URL.revokeObjectURL(asset.previewUrl);
      assets = assets.filter((a) => a.id !== id);
      renderAssets();
    }

    function createMentionNode(asset) {
      const node = document.createElement("span");
      node.className = "prompt-mention";
      node.contentEditable = "false";
      node.dataset.name = asset.tag;
      node.dataset.id = asset.id;
      if (asset.kind === "image" && asset.previewUrl) {
        const img = document.createElement("img");
        img.src = asset.previewUrl;
        img.alt = asset.tag;
        node.appendChild(img);
      } else if (asset.kind === "video" && asset.previewUrl) {
        const video = document.createElement("video");
        video.src = asset.previewUrl;
        video.muted = true;
        node.appendChild(video);
      }
      const label = document.createElement("span");
      label.textContent = "@" + asset.tag;
      node.appendChild(label);
      return node;
    }
    function rangeInsidePrompt(range) {
      return range && els.prompt.contains(range.commonAncestorContainer);
    }
    function moveCaretAfter(node) {
      const selection = window.getSelection();
      const range = document.createRange();
      range.setStartAfter(node);
      range.collapse(true);
      selection.removeAllRanges();
      selection.addRange(range);
    }
    function rangeAfterRemovingTriggerAt() {
      if (!mentionTriggerRange || !rangeInsidePrompt(mentionTriggerRange)) return null;
      const range = mentionTriggerRange;
      mentionTriggerRange = null;
      const container = range.startContainer;
      const offset = range.startOffset;
      if (container.nodeType !== Node.TEXT_NODE || offset < 1) return range;
      const text = container.textContent || "";
      if (text[offset - 1] !== "@") return range;
      container.textContent = text.slice(0, offset - 1) + text.slice(offset);
      range.setStart(container, offset - 1);
      range.collapse(true);
      return range;
    }
    function getCaretClientRect() {
      const selection = window.getSelection();
      if (!selection || !selection.rangeCount) return null;
      const range = selection.getRangeAt(0);
      if (!rangeInsidePrompt(range)) return null;
      let rect = range.getBoundingClientRect();
      if ((!rect || (rect.width === 0 && rect.height === 0)) && mentionTriggerRange) {
        rect = mentionTriggerRange.getBoundingClientRect();
      }
      if (!rect || (rect.width === 0 && rect.height === 0)) {
        try {
          const probe = document.createRange();
          probe.setStart(range.startContainer, Math.max(0, range.startOffset - 1));
          probe.setEnd(range.startContainer, range.startOffset);
          rect = probe.getBoundingClientRect();
        } catch {
          return null;
        }
      }
      if (!rect || (rect.top === 0 && rect.bottom === 0 && rect.left === 0)) return null;
      return rect;
    }
    function positionMentionMenu() {
      if (!els.mentionMenu.classList.contains("show")) return;
      const caret = getCaretClientRect();
      const menu = els.mentionMenu;
      const gap = 6;
      const pad = 8;
      const menuWidth = Math.min(menu.offsetWidth || 280, window.innerWidth - pad * 2);
      const menuHeight = Math.min(menu.offsetHeight || 180, window.innerHeight - pad * 2);
      let left = pad;
      let top = pad;
      if (caret) {
        left = caret.left;
        top = caret.bottom + gap;
        if (top + menuHeight > window.innerHeight - pad) {
          top = caret.top - menuHeight - gap;
        }
      } else {
        const box = els.prompt.getBoundingClientRect();
        left = box.left + 8;
        top = box.bottom - menuHeight - 8;
        if (top < pad) top = box.top + 8;
      }
      if (left + menuWidth > window.innerWidth - pad) left = window.innerWidth - pad - menuWidth;
      left = Math.max(pad, left);
      top = Math.max(pad, Math.min(top, window.innerHeight - menuHeight - pad));
      menu.style.left = Math.round(left) + "px";
      menu.style.top = Math.round(top) + "px";
    }
    function showMentionMenu() {
      renderMentionMenu();
      els.mentionMenu.classList.add("show");
      requestAnimationFrame(positionMentionMenu);
    }
    function hideMentionMenu() {
      els.mentionMenu.classList.remove("show");
      mentionTriggerRange = null;
    }
    function insertMention(asset) {
      els.prompt.focus();
      const node = createMentionNode(asset);
      const spacer = document.createTextNode(" ");
      const selection = window.getSelection();
      let range = rangeAfterRemovingTriggerAt();
      if (!range && selection && selection.rangeCount && rangeInsidePrompt(selection.getRangeAt(0))) {
        range = selection.getRangeAt(0);
      }
      if (!range) {
        els.prompt.appendChild(node);
        els.prompt.appendChild(spacer);
        moveCaretAfter(spacer);
        hideMentionMenu();
        updateRefs();
        scheduleRebuild();
        return;
      }
      range.deleteContents();
      range.insertNode(spacer);
      range.insertNode(node);
      moveCaretAfter(spacer);
      hideMentionMenu();
      updateRefs();
      scheduleRebuild();
    }
    function updateRefs() {
      els.refList.innerHTML = "";
      if (!assets.length) return;
      assets.forEach((asset) => {
        const pill = document.createElement("div");
        pill.className = "ref-pill";
        const thumb = document.createElement("div");
        thumb.className = "ref-thumb";
        if (asset.kind === "image" && asset.previewUrl) {
          const img = document.createElement("img");
          img.src = asset.previewUrl;
          thumb.appendChild(img);
        } else if (asset.kind === "video" && asset.previewUrl) {
          const video = document.createElement("video");
          video.src = asset.previewUrl;
          video.muted = true;
          thumb.appendChild(video);
        } else {
          thumb.textContent = kindLabel(asset.kind).slice(0, 1);
        }
        const label = document.createElement("span");
        label.textContent = "@" + asset.tag;
        pill.appendChild(thumb);
        pill.appendChild(label);
        els.refList.appendChild(pill);
      });
    }

    async function readJson(response) {
      const text = await response.text();
      try { return JSON.parse(text); } catch { return { raw: text }; }
    }
    function formatError(data, status) {
      const message = data.message || data.error || data.raw || `HTTP ${status}`;
      if (/quota|balance|credit|余额|额度|不足|INSUFFICIENT/i.test(String(message) + String(data.code || ""))) {
        return `余额不足：${message}`;
      }
      return typeof message === "object" ? JSON.stringify(message) : String(message);
    }
    function extractUploadUrl(data) {
      if (!data || typeof data !== "object") return "";
      return data.url || data.data?.url || data.link || data.image_url || data.result?.url || "";
    }

    function facePassEnabled() {
      return !!(els.facePass && els.facePass.checked);
    }

    async function uploadToFaceDetect(asset) {
      if (asset.publicUrl) {
        asset.uploadStatus = "ready";
        return asset;
      }
      if (!asset.file) {
        asset.uploadStatus = "failed";
        asset.uploadError = "无本地文件";
        return asset;
      }
      if (asset.kind !== "image") {
        asset.uploadStatus = "local";
        asset.uploadError = "非图片请粘贴公网 URL，或 mingiz 用 multipart";
        return asset;
      }
      asset.viaFacePass = true;
      asset.uploadStatus = "uploading";
      renderAssets();
      const form = new FormData();
      form.append("image", asset.file, asset.file.name);
      const response = await fetch(FACE_DETECT_API, { method: "POST", body: form });
      const data = await readJson(response);
      if (!response.ok || data.ok === false) throw new Error(formatError(data, response.status));
      const url = extractUploadUrl(data);
      if (!url) throw new Error("人脸服务未返回 url");
      asset.publicUrl = url;
      asset.viaFacePass = true;
      asset.uploadStatus = "ready";
      renderAssets();
      return asset;
    }

    async function uploadToImageHost(asset) {
      if (asset.publicUrl) {
        asset.uploadStatus = "ready";
        return asset;
      }
      if (!asset.file) {
        asset.uploadStatus = "failed";
        asset.uploadError = "无本地文件";
        return asset;
      }
      if (asset.kind !== "image") {
        asset.uploadStatus = "local";
        asset.uploadError = "非图片请粘贴公网 URL，或 mingiz 用 multipart";
        return asset;
      }
      asset.uploadStatus = "uploading";
      renderAssets();
      const form = new FormData();
      form.append("file", asset.file, asset.file.name);
      const response = await fetch(imageHost(), {
        method: "POST",
        headers: { Authorization: `Bearer ${imageToken()}` },
        body: form,
      });
      const data = await readJson(response);
      if (!response.ok) throw new Error(formatError(data, response.status));
      const url = extractUploadUrl(data);
      if (!url) throw new Error("图床未返回 url");
      asset.publicUrl = url;
      asset.uploadStatus = "ready";
      asset.previewUrl = asset.previewUrl || url;
      renderAssets();
      return asset;
    }

    async function uploadImageAsset(asset, useFacePass) {
      if (useFacePass) return uploadToFaceDetect(asset);
      return uploadToImageHost(asset);
    }

    async function ensureAssetsReady(list, preferMultipart) {
      for (const asset of list) {
        if (asset.publicUrl) {
          asset.uploadStatus = "ready";
          continue;
        }
        if (preferMultipart && asset.file && !asset.viaFacePass) {
          asset.uploadStatus = asset.uploadStatus === "ready" ? "ready" : "local";
          continue;
        }
        if (asset.file && asset.kind === "image") {
          await uploadImageAsset(asset, facePassEnabled() || !!asset.viaFacePass);
        } else if (!asset.publicUrl) {
          throw new Error(`素材 @${asset.tag || asset.name} 需要公网 URL（可上传图床或粘贴链接）`);
        }
      }
    }

    function buildAistarBody(submitAssets) {
      const size = SIZE_MAP[els.aspectRatio.value] || SIZE_MAP["16:9"];
      const body = {
        model: activeModelName(),
        prompt: promptText(),
        duration: Number(els.duration.value),
        width: size.width,
        height: size.height,
        n: 1,
      };
      const urls = submitAssets.map((a) => a.publicUrl).filter(Boolean);
      if (urls.length) body.images = urls;
      return body;
    }

    function buildDoubaoBody(submitAssets) {
      const body = {
        model: activeModelName(),
        generate_audio: els.generateAudio.value === "1",
        ratio: els.aspectRatio.value,
        resolution: els.resolution.value,
        duration: Number(els.duration.value),
        watermark: els.watermark.value === "1",
      };
      if (!submitAssets.length) {
        body.prompt = promptText();
        body.metadata = {
          ratio: body.ratio,
          resolution: body.resolution,
          duration: body.duration,
          watermark: body.watermark,
        };
        return body;
      }
      const content = [{ type: "text", text: promptText() }];
      for (const asset of submitAssets) {
        const url = asset.publicUrl;
        if (!url) continue;
        if (asset.kind === "image") {
          content.push({ type: "image_url", image_url: { url }, role: "reference_image" });
        } else if (asset.kind === "video") {
          content.push({ type: "video_url", video_url: { url }, role: "reference_video" });
        } else if (asset.kind === "audio") {
          content.push({ type: "audio_url", audio_url: { url }, role: "reference_audio" });
        }
      }
      body.content = content;
      return body;
    }

    function buildMingizJsonBody(submitAssets) {
      const body = {
        model: activeModelName(),
        prompt: promptText(),
        duration: Number(els.duration.value),
        aspect_ratio: els.aspectRatio.value,
        resolution: els.resolution.value,
      };
      if (profile().family === "openai") {
        body.seconds = String(body.duration);
      }
      const urls = submitAssets.map((a) => a.publicUrl).filter(Boolean);
      if (urls.length) body.images = urls;
      return body;
    }

    function buildTh12345aiBody(submitAssets) {
      const body = {
        model: activeModelName(),
        prompt: promptText(),
        duration: Number(els.duration.value),
        ratio: els.aspectRatio.value,
        resolution: els.resolution.value,
      };
      const images = [];
      const videos = [];
      const audios = [];
      for (const asset of submitAssets) {
        const url = asset.publicUrl;
        if (!url) continue;
        if (asset.kind === "video") videos.push(url);
        else if (asset.kind === "audio") audios.push(url);
        else images.push(url);
      }
      if (images.length) body.images = images;
      if (videos.length) body.videos = videos;
      if (audios.length) body.audios = audios;
      return body;
    }

    function buildRequestPlan() {
      const p = profile();
      const submitAssets = getSubmitAssets();
      const preferMultipart = (p.family === "mingiz" || p.family === "vyro") && els.mingizSend.value === "multipart";
      if (p.family === "aistar") {
        return { kind: "json", path: p.createPath, body: buildAistarBody(submitAssets), assets: submitAssets, preferMultipart: false };
      }
      if (p.family === "doubao") {
        return { kind: "json", path: p.createPath, body: buildDoubaoBody(submitAssets), assets: submitAssets, preferMultipart: false };
      }
      if (p.family === "th12345ai") {
        return { kind: "json", path: p.createPath, body: buildTh12345aiBody(submitAssets), assets: submitAssets, preferMultipart: false };
      }
      if (preferMultipart) {
        return {
          kind: "multipart",
          path: p.createPath,
          body: {
            model: activeModelName(),
            prompt: promptText(),
            duration: Number(els.duration.value),
            aspect_ratio: els.aspectRatio.value,
            resolution: els.resolution.value,
            files: submitAssets.filter((a) => a.file).map((a) => a.name),
          },
          assets: submitAssets,
          preferMultipart: true,
        };
      }
      return { kind: "json", path: p.createPath, body: buildMingizJsonBody(submitAssets), assets: submitAssets, preferMultipart: false };
    }

    function scheduleRebuild() {
      window.clearTimeout(rebuildTimer);
      rebuildTimer = window.setTimeout(rebuildPayloadPreview, 80);
    }
    function rebuildPayloadPreview() {
      const plan = buildRequestPlan();
      if (plan.kind === "multipart") {
        els.payloadPreview.value = JSON.stringify({
          _note: "将以 multipart/form-data 提交；reference_images 为本地文件",
          ...plan.body,
        }, null, 2);
      } else {
        els.payloadPreview.value = JSON.stringify(plan.body, null, 2);
      }
    }

    function validate() {
      const tokenError = ensureTokenReady();
      if (tokenError) return tokenError;
      if (!promptText()) return "请填写提示词。";
      if (!els.model.value || !plazaModels.some((m) => m.id === els.model.value)) {
        return "请选择模型广场中的可用模型。";
      }
      const missing = referencedAssets().filter((ref) => !ref.asset).map((ref) => ref.name);
      if (missing.length) return `提示词引用了不存在的素材：${missing.map((n) => "@" + n).join("、")}`;
      const p = profile();
      const submitAssets = getSubmitAssets();
      if (els.mode.value === "image_to_video" && !submitAssets.some((a) => a.kind === "image" || a.publicUrl)) {
        return "图生模式至少需要一张图片素材。";
      }
      if (p.family === "doubao") {
        const seconds = Number(els.duration.value);
        if (!Number.isInteger(seconds) || seconds < 5 || seconds > 15) return "doubao 时长需为 5～15 秒。";
      }
      if (p.family === "th12345ai") {
        const seconds = Number(els.duration.value);
        const allowed = p.durations || [];
        if (!allowed.includes(seconds)) {
          return `${activeModelName()} 时长需为 ${allowed.join(" / ")} 秒。`;
        }
      }
      return "";
    }

    function lock(isBusy) {
      els.submitBtn.disabled = isBusy;
    }

    function hideTaskResult() {
      els.previewModal.classList.remove("show");
      els.video.removeAttribute("src");
      els.video.load();
      if (previewObjectUrl) {
        URL.revokeObjectURL(previewObjectUrl);
        previewObjectUrl = "";
      }
    }

    function extractVideoUrl(payload) {
      return payload.result_url
        || payload.metadata?.url
        || payload.url
        || payload.content?.video_url
        || payload.data?.result_url
        || payload.data?.metadata?.url
        || "";
    }

    async function showTaskResult(taskId, directUrl = "", family = "") {
      if (directUrl) {
        els.video.src = directUrl;
        els.download.href = directUrl;
        els.download.download = `${taskId}.mp4`;
        els.previewModal.classList.add("show");
        setStatus("成片已就绪，可预览或下载。", "ok");
        return;
      }
      setStatus("正在拉取成片预览…");
      const tokenError = ensureTokenReady();
      if (tokenError) throw new Error(tokenError);
      const p = profileByFamily(family || currentFamily);
      const response = await fetch(`${apiBase()}${p.contentPath(taskId)}`, { headers: authHeaders() });
      if (!response.ok) {
        const data = await readJson(response);
        throw new Error(formatError(data, response.status));
      }
      const blob = await response.blob();
      if (previewObjectUrl) URL.revokeObjectURL(previewObjectUrl);
      previewObjectUrl = URL.createObjectURL(blob);
      els.video.src = previewObjectUrl;
      els.download.href = previewObjectUrl;
      els.download.download = `${taskId}.mp4`;
      els.previewModal.classList.add("show");
      setStatus("成片已就绪，可预览或下载。", "ok");
    }

    async function downloadTask(task) {
      if (task.resultUrl) {
        const a = document.createElement("a");
        a.href = task.resultUrl;
        a.download = `${task.id}.mp4`;
        a.target = "_blank";
        a.rel = "noopener";
        a.click();
        return;
      }
      await showTaskResult(task.id, "", task.family || "");
    }

    function buildHistCard(task, running) {
      const card = document.createElement("div");
      card.className = "hist-card" + (running ? " running" : "");
      const media = document.createElement("div");
      media.className = "hist-media";
      if (isSuccess(task.status) && task.resultUrl) {
        const video = document.createElement("video");
        video.src = task.resultUrl;
        video.muted = true;
        video.preload = "metadata";
        media.appendChild(video);
      } else if (isFailed(task.status)) {
        media.textContent = "失败";
      } else {
        media.textContent = statusLabel(task.status) + " · " + clampProgress(task.progress) + "%";
      }
      const body = document.createElement("div");
      body.className = "hist-body";
      const prompt = document.createElement("div");
      prompt.className = "hist-prompt";
      prompt.textContent = task.prompt || task.params?.prompt || task.model || task.id;
      const meta = document.createElement("div");
      meta.className = "hist-meta";
      const badge = document.createElement("div");
      badge.className = "task-badge " + statusKind(task.status);
      badge.textContent = statusLabel(task.status);
      const model = document.createElement("span");
      model.style.cssText = "font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap";
      model.textContent = task.model || "";
      meta.appendChild(badge);
      meta.appendChild(model);
      if (running || isProcessing(task.status)) {
        const bar = document.createElement("div");
        bar.className = "task-progress";
        bar.innerHTML = `<span style="--progress:${clampProgress(task.progress)}%"></span>`;
        body.appendChild(prompt);
        body.appendChild(meta);
        body.appendChild(bar);
      } else {
        body.appendChild(prompt);
        body.appendChild(meta);
        if (isFailed(task.status) && task.fail_reason) {
          const err = document.createElement("div");
          err.style.cssText = "font-size:11px;color:#ff9baa";
          err.textContent = task.fail_reason;
          body.appendChild(err);
        }
      }
      const actions = document.createElement("div");
      actions.className = "hist-actions";
      if (isSuccess(task.status)) {
        const preview = document.createElement("button");
        preview.type = "button";
        preview.className = "secondary";
        preview.textContent = "预览";
        preview.onclick = () => showTaskResult(task.id, task.resultUrl || "", task.family || "").catch((err) => setStatus(err.message, "bad"));
        actions.appendChild(preview);
        const dl = document.createElement("button");
        dl.type = "button";
        dl.className = "secondary";
        dl.textContent = "下载";
        dl.onclick = () => downloadTask(task).catch((err) => setStatus(err.message, "bad"));
        actions.appendChild(dl);
      } else if (isProcessing(task.status)) {
        const refresh = document.createElement("button");
        refresh.type = "button";
        refresh.className = "secondary";
        refresh.textContent = "刷新";
        refresh.onclick = () => pollOnce(task.id).catch((err) => setStatus(`轮询失败：${err.message}`, "bad"));
        actions.appendChild(refresh);
      }
      const remake = document.createElement("button");
      remake.type = "button";
      remake.className = "secondary";
      remake.textContent = "再做一条";
      remake.onclick = () => remakeFromTask(task);
      actions.appendChild(remake);
      const del = document.createElement("button");
      del.type = "button";
      del.className = "danger";
      del.textContent = "删除";
      del.onclick = () => deleteTask(task.id);
      actions.appendChild(del);
      body.appendChild(actions);
      card.appendChild(media);
      card.appendChild(body);
      return card;
    }

    function renderTasks(tasks = readTasks()) {
      els.runningList.innerHTML = "";
      els.historyGrid.innerHTML = "";
      const running = tasks.filter((t) => isProcessing(t.status));
      const done = tasks.filter((t) => !isProcessing(t.status));
      running.forEach((task) => els.runningList.appendChild(buildHistCard(task, true)));
      done.forEach((task) => els.historyGrid.appendChild(buildHistCard(task, false)));
      els.historyEmpty.classList.toggle("hidden", tasks.length > 0);
      els.historyCount.textContent = `${tasks.length} 条 · 进行中 ${running.length}`;
    }

    async function submitTask() {
      const error = validate();
      if (error) { setStatus(error, "bad"); return; }
      currentTaskId = "";
      lock(true);
      try {
        let plan;
        try {
          const edited = JSON.parse(els.payloadPreview.value);
          if (edited && edited._note) {
            plan = buildRequestPlan();
          } else {
            plan = { ...buildRequestPlan(), body: edited, kind: "json", preferMultipart: false };
          }
        } catch {
          plan = buildRequestPlan();
        }

        setStatus(plan.preferMultipart ? "准备 multipart 提交…" : "确认素材 / 上传图床…");
        await ensureAssetsReady(plan.assets, plan.preferMultipart);
        if (!plan.preferMultipart) {
          const fresh = buildRequestPlan();
          if (!els.payloadPreview.dataset.dirty) {
            plan = fresh;
            rebuildPayloadPreview();
          } else {
            try { plan.body = JSON.parse(els.payloadPreview.value); } catch { /* keep */ }
          }
        }

        setStatus("正在创建视频任务…");
        let response;
        if (plan.preferMultipart) {
          const form = new FormData();
          form.append("model", activeModelName());
          form.append("prompt", promptText());
          form.append("duration", String(Number(els.duration.value)));
          form.append("aspect_ratio", els.aspectRatio.value);
          form.append("resolution", els.resolution.value);
          for (const asset of plan.assets) {
            if (asset.viaFacePass && asset.publicUrl) form.append("images", asset.publicUrl);
            else if (asset.file) form.append("reference_images", asset.file, asset.file.name);
            else if (asset.publicUrl) form.append("images", asset.publicUrl);
          }
          response = await fetch(`${apiBase()}${plan.path}`, {
            method: "POST",
            headers: authHeaders({ Accept: "application/json" }),
            body: form,
          });
        } else {
          response = await fetch(`${apiBase()}${plan.path}`, {
            method: "POST",
            headers: authHeaders({ "Content-Type": "application/json", Accept: "application/json" }),
            body: JSON.stringify(plan.body),
          });
        }
        const data = await readJson(response);
        if (!response.ok) throw new Error(formatError(data, response.status));
        currentTaskId = data.task_id || data.id || data.data?.task_id || data.data?.id;
        if (!currentTaskId) throw new Error("提交成功但未返回 task_id");
        currentFamily = profile().family;
        const params = snapshotParams();
        upsertTask({
          id: currentTaskId,
          status: data.status || data.data?.status || "queued",
          progress: data.progress ?? data.data?.progress ?? 0,
          family: currentFamily,
          model: activeModelName(),
          prompt: params.prompt,
          params,
          createdAt: Date.now(),
          resultUrl: "",
          fail_reason: "",
        });
        setStatus(`任务已创建：${currentTaskId}`, "ok");
        els.payloadPreview.dataset.dirty = "";
        ensurePolling();
      } catch (err) {
        setStatus(`提交失败：${err.message}`, "bad");
      } finally {
        lock(false);
      }
    }

    async function pollOnce(taskId = currentTaskId) {
      if (!taskId) { setStatus("没有可轮询的任务。", "bad"); return; }
      const tokenError = ensureTokenReady();
      if (tokenError) { setStatus(tokenError, "bad"); return; }
      currentTaskId = taskId;
      const taskMeta = readTasks().find((t) => t.id === taskId);
      const family = taskMeta?.family || profile().family;
      const p = profileByFamily(family);
      const response = await fetch(`${apiBase()}${p.queryPath(taskId)}`, { headers: authHeaders() });
      const data = await readJson(response);
      if (!response.ok) throw new Error(formatError(data, response.status));
      const payload = data.data || data;
      const status = payload.status || "unknown";
      const progress = payload.progress ?? 0;
      const resultUrl = extractVideoUrl(payload) || extractVideoUrl(data);
      const failReason = payload.fail_reason || payload.error?.message || payload.message || "";
      const patch = {
        id: taskId,
        status,
        progress,
        resultUrl: resultUrl || taskMeta?.resultUrl || "",
        fail_reason: failReason,
        family,
        updatedAt: Date.now(),
      };
      upsertTask(patch);
      if (isSuccess(status)) {
        setStatus(`任务 ${taskId} 已完成。`, "ok");
      } else if (isFailed(status)) {
        setStatus(`任务失败：${failReason || status}`, "bad");
      } else {
        setStatus(`任务 ${taskId}\n状态：${statusLabel(status)}（${clampProgress(progress)}%）`);
      }
      ensurePolling();
    }

    async function pollAllPending() {
      if (pollInFlight) return;
      const pending = readTasks().filter((t) => isProcessing(t.status));
      if (!pending.length) {
        stopPolling();
        return;
      }
      pollInFlight = true;
      try {
        for (const task of pending) {
          try {
            await pollOnce(task.id);
          } catch (err) {
            setStatus(`轮询失败（${task.id}）：${err.message}`, "bad");
          }
        }
      } finally {
        pollInFlight = false;
      }
      if (!readTasks().some((t) => isProcessing(t.status))) stopPolling();
    }

    function ensurePolling() {
      const pending = readTasks().filter((t) => isProcessing(t.status));
      if (!pending.length) {
        stopPolling();
        return;
      }
      if (!currentTaskId) currentTaskId = pending[0].id;
      if (polling) return;
      polling = true;
      pollAllPending();
      pollTimer = window.setInterval(() => {
        pollAllPending();
      }, 12000);
    }
    function stopPolling() {
      polling = false;
      window.clearInterval(pollTimer);
      pollTimer = 0;
    }

    function clearAll() {
      assets.forEach((a) => a.previewUrl && a.previewUrl.startsWith("blob:") && URL.revokeObjectURL(a.previewUrl));
      assets = [];
      els.assetFiles.value = "";
      hideTaskResult();
      renderAssets();
      lock(false);
      setStatus("已清空创作区（历史保留）。");
    }

    async function handleFilesSelected() {
      const incoming = Array.from(els.assetFiles.files || []).map((file) => {
        const kind = assetKind(file);
        return {
          id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
          file,
          kind,
          name: file.name || kindLabel(kind),
          tag: "",
          previewUrl: URL.createObjectURL(file),
          uploadStatus: "pending",
          publicUrl: "",
          uploadError: "",
          viaFacePass: false,
        };
      });
      els.assetFiles.value = "";
      assets = assets.concat(incoming);
      renderAssets();
      const p = profile();
      const preferMultipart = (p.family === "mingiz" || p.family === "vyro") && els.mingizSend.value === "multipart";
      const useFacePass = facePassEnabled();
      for (const asset of incoming) {
        try {
          if (useFacePass && asset.kind === "image" && asset.file) {
            await uploadImageAsset(asset, true);
          } else if (preferMultipart && asset.file) {
            asset.uploadStatus = "local";
            renderAssets();
          } else if (asset.kind === "image") {
            await uploadImageAsset(asset, false);
          } else {
            asset.uploadStatus = "failed";
            asset.uploadError = "请粘贴公网 URL";
            renderAssets();
          }
        } catch (err) {
          asset.uploadStatus = "failed";
          asset.uploadError = err.message;
          renderAssets();
          setStatus(`素材 @${asset.tag || asset.name} 上传失败：${err.message}`, "bad");
        }
      }
      const ok = incoming.filter((a) => a.publicUrl || a.uploadStatus === "local").length;
      if (ok) setStatus(useFacePass ? `已过人脸处理 ${ok} 个素材。` : `已处理 ${ok} 个素材。`, "ok");
      scheduleRebuild();
    }

    function addManualUrl() {
      const url = (els.manualUrl.value || "").trim();
      if (!/^https?:\/\//i.test(url)) {
        setStatus("请输入有效的 http(s) URL。", "bad");
        return;
      }
      const kind = assetKind(url);
      const asset = {
        id: `${Date.now()}-${Math.random().toString(16).slice(2)}`,
        file: null,
        kind,
        name: kindLabel(kind),
        tag: "",
        previewUrl: kind === "image" || kind === "video" ? url : "",
        uploadStatus: "ready",
        publicUrl: url,
        uploadError: "",
        viaFacePass: false,
      };
      assets.push(asset);
      els.manualUrl.value = "";
      renderAssets();
      setStatus(`已添加素材：@${asset.tag}`, "ok");
    }

    async function copyCurl() {
      const plan = buildRequestPlan();
      const key = token() || "sk-你的令牌";
      let text = "";
      if (plan.preferMultipart) {
        text = `curl -X POST "${apiBase()}${plan.path}" \\\n  -H "Authorization: Bearer ${key}" \\\n  -H "Accept: application/json" \\\n  -F "model=${activeModelName()}" \\\n  -F "prompt=${promptText().replace(/"/g, '\\"')}" \\\n  -F "duration=${els.duration.value}" \\\n  -F "aspect_ratio=${els.aspectRatio.value}" \\\n  -F "resolution=${els.resolution.value}" \\\n  -F "reference_images=@./ref.jpg"`;
      } else {
        let body = plan.body;
        try { body = JSON.parse(els.payloadPreview.value); } catch { /* keep */ }
        text = `curl -s -X POST "${apiBase()}${plan.path}" \\\n  -H "Authorization: Bearer ${key}" \\\n  -H "Content-Type: application/json" \\\n  -d '${JSON.stringify(body)}'`;
      }
      await navigator.clipboard.writeText(text);
      setStatus("curl 已复制到剪贴板。", "ok");
    }

    function applyModelUI() {
      const p = profile();
      currentFamily = p.family;
      if (els.customModelField) els.customModelField.classList.add("hidden");
      const meta = plazaModels.find((m) => m.id === els.model.value);
      if (meta && meta.description) {
        els.modelHint.textContent = `${meta.description} · ${p.hint}`;
      } else {
        els.modelHint.textContent = plazaLoaded
          ? (els.model.value ? p.hint : "模型广场暂无可用的 Seedance / 视频模型。")
          : "正在从模型广场加载…";
      }
      els.modeField.classList.toggle("hidden", !p.showMode);
      els.resolutionField.classList.toggle("hidden", !p.showResolution);
      els.audioField.classList.toggle("hidden", !p.showAudioWatermark);
      els.watermarkField.classList.toggle("hidden", !p.showAudioWatermark);
      els.mingizSendField.classList.toggle("hidden", !p.showMingizSend);
      const cur = Number(els.duration.value) || p.defaultDuration;
      els.duration.innerHTML = p.durations.map((d) =>
        `<option value="${d}" ${d === (p.durations.includes(cur) ? cur : p.defaultDuration) ? "selected" : ""}>${d} 秒</option>`
      ).join("");
      els.apiBaseHint.textContent = els.model.value
        ? `当前请求：${apiBase()}${p.createPath} · model=${activeModelName()}`
        : "请选择模型广场中的模型。";
      scheduleRebuild();
    }

    async function loadPlazaModels() {
      try {
        const res = await siteApi("/api/pricing");
        const data = await readJson(res);
        if (!res.ok || data.success === false) {
          throw new Error(data.message || `HTTP ${res.status}`);
        }
        const items = Array.isArray(data.data) ? data.data : [];
        plazaModels = items
          .filter(isSeedancePlazaItem)
          .map((item) => ({
            id: item.model_name,
            label: item.model_name,
            description: item.description || "",
            profileKey: resolveProfileKey(item.model_name),
          }))
          .sort((a, b) => a.id.localeCompare(b.id, "zh-CN"));
        // 去重
        const seen = new Set();
        plazaModels = plazaModels.filter((m) => {
          if (seen.has(m.id)) return false;
          seen.add(m.id);
          return true;
        });
        plazaLoaded = true;
      } catch (err) {
        plazaModels = [];
        plazaLoaded = true;
        setStatus(`加载模型广场失败：${err.message}`, "bad");
      }
      renderModelSelect();
    }

    function renderModelSelect() {
      const saved = readLocal(STORAGE.model);
      if (!plazaModels.length) {
        els.model.innerHTML = `<option value="">（模型广场暂无可用模型）</option>`;
        els.model.value = "";
        applyModelUI();
        return;
      }
      els.model.innerHTML = plazaModels.map((m) =>
        `<option value="${escapeHtml(m.id)}">${escapeHtml(m.label)}</option>`
      ).join("");
      const preferred = plazaModels.find((m) => m.id === saved) || plazaModels[0];
      els.model.value = preferred.id;
      saveLocal(STORAGE.model, preferred.id);
      applyModelUI();
    }

    function initModels() {
      els.model.innerHTML = `<option value="">加载模型广场…</option>`;
      els.customModelField.classList.add("hidden");
    }

    async function init() {
      initModels();
      els.apiBase.value = readLocal(STORAGE.apiBase);
      els.imageHost.value = readLocal(STORAGE.imageHost) || DEFAULT_IMAGE_HOST;
      els.imageToken.value = readLocal(STORAGE.imageToken) || DEFAULT_IMAGE_TOKEN;
      if (!readLocal(STORAGE.imageToken)) saveLocal(STORAGE.imageToken, DEFAULT_IMAGE_TOKEN);
      if (!readLocal(STORAGE.imageHost)) saveLocal(STORAGE.imageHost, DEFAULT_IMAGE_HOST);
      renderTasks();
      renderAssets();
      lock(false);
      await initAuth();
      await loadPlazaModels();
      ensurePolling();
    }

    els.model.addEventListener("change", () => {
      saveLocal(STORAGE.model, els.model.value);
      applyModelUI();
      setStatus(els.model.value ? `已切换模型：${activeModelName()}` : "请选择模型。", els.model.value ? "ok" : "warn");
    });
    els.customModel.addEventListener("input", () => {
      // 保留字段兼容旧本地配置；模型列表已改为模型广场，不再使用自定义 ID
    });
    ["mode", "mingizSend", "duration", "aspectRatio", "resolution", "generateAudio", "watermark"].forEach((id) => {
      els[id].addEventListener("change", () => {
        els.payloadPreview.dataset.dirty = "";
        scheduleRebuild();
      });
    });
    els.apiBase.addEventListener("change", () => {
      saveLocal(STORAGE.apiBase, els.apiBase.value.trim());
      applyModelUI();
    });
    els.payloadPreview.addEventListener("input", () => { els.payloadPreview.dataset.dirty = "1"; });
    els.assetFiles.addEventListener("change", () => {
      handleFilesSelected().catch((err) => setStatus(err.message, "bad"));
    });
    els.addUrlBtn.addEventListener("click", addManualUrl);
    els.prompt.addEventListener("input", () => {
      const selection = window.getSelection();
      const range = selection && selection.rangeCount ? selection.getRangeAt(0) : null;
      const node = range ? range.startContainer : null;
      const before = node && node.nodeType === Node.TEXT_NODE ? node.textContent.slice(0, range.startOffset) : "";
      if (before.endsWith("@") && assets.length) {
        mentionTriggerRange = range.cloneRange();
        showMentionMenu();
      } else {
        hideMentionMenu();
      }
      updateRefs();
      scheduleRebuild();
    });
    els.prompt.addEventListener("keyup", () => {
      if (els.mentionMenu.classList.contains("show")) positionMentionMenu();
    });
    els.prompt.addEventListener("scroll", () => {
      if (els.mentionMenu.classList.contains("show")) positionMentionMenu();
    }, { passive: true });
    window.addEventListener("resize", () => {
      if (els.mentionMenu.classList.contains("show")) positionMentionMenu();
    });
    window.addEventListener("scroll", () => {
      if (els.mentionMenu.classList.contains("show")) positionMentionMenu();
    }, true);
    els.prompt.addEventListener("blur", () => setTimeout(() => {
      if (!els.mentionMenu.contains(document.activeElement)) hideMentionMenu();
    }, 180));
    els.saveKeyBtn.addEventListener("click", () => {
      const key = withSkPrefix(els.token.value);
      if (!key || !/^sk-/i.test(key)) { setStatus("请填写有效的 sk- API Key。", "bad"); return; }
      els.token.value = key;
      saveLocal(STORAGE.key, key);
      setStatus("Key 已保存。", "ok");
    });
    els.toggleKeyBtn.addEventListener("click", () => {
      const show = els.token.type === "password";
      els.token.type = show ? "text" : "password";
      els.toggleKeyBtn.textContent = show ? "隐藏" : "显示";
    });
    els.clearKeyBtn.addEventListener("click", () => {
      removeLocal(STORAGE.key);
      els.token.value = "";
      setStatus("Key 已清除。");
    });
    els.saveImageBtn.addEventListener("click", () => {
      saveLocal(STORAGE.imageHost, imageHost());
      saveLocal(STORAGE.imageToken, imageToken());
      els.imageHost.value = imageHost();
      els.imageToken.value = imageToken();
      setStatus("图床配置已保存。", "ok");
    });
    els.toggleImageTokenBtn.addEventListener("click", () => {
      const show = els.imageToken.type === "password";
      els.imageToken.type = show ? "text" : "password";
      els.toggleImageTokenBtn.textContent = show ? "隐藏" : "显示";
    });
    els.tokenSelect.addEventListener("change", () => {
      const id = els.tokenSelect.value;
      if (!id) return;
      fetchSessionKey(id)
        .then(() => setStatus("已切换令牌。", "ok"))
        .catch((err) => {
          sessionKey = "";
          setStatus(`切换令牌失败：${err.message}`, "bad");
        });
    });
    els.clearAllBtn.addEventListener("click", clearAll);
    els.submitBtn.addEventListener("click", submitTask);
    els.copyCurlBtn.addEventListener("click", () => copyCurl().catch((err) => setStatus(err.message, "bad")));
    els.closePreviewBtn.addEventListener("click", hideTaskResult);
    els.previewModal.addEventListener("click", (e) => {
      if (e.target === els.previewModal) hideTaskResult();
    });

    init().catch((err) => setStatus(`初始化失败：${err.message}`, "bad"));
  </script>
</body>
</html>
